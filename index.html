<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superpowers Skill 编写课 · 从零到独立产出</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
/* ============ 主题变量 ============ */
:root {
  --bg: #f7f8fa;
  --bg-elevated: #ffffff;
  --bg-sidebar: #ffffff;
  --bg-soft: #f0f2f5;
  --bg-code: #f5f6f8;
  --bg-highlight: #fff8dc;
  --text: #1a1d23;
  --text-secondary: #5b6470;
  --text-muted: #8a93a3;
  --border: #e4e7ec;
  --border-strong: #d0d5dd;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-soft: #eef2ff;
  --success: #16a34a;
  --success-soft: #dcfce7;
  --warning: #d97706;
  --warning-soft: #fef3c7;
  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --accent-blue: #2563eb;
  --accent-blue-soft: #dbeafe;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --sidebar-w: 280px;
}
[data-theme="dark"] {
  --bg: #0f1115;
  --bg-elevated: #1a1d24;
  --bg-sidebar: #161920;
  --bg-soft: #232730;
  --bg-code: #1e2128;
  --bg-highlight: #2a2418;
  --text: #e6e8ec;
  --text-secondary: #a8b0bd;
  --text-muted: #6b7280;
  --border: #2a2f3a;
  --border-strong: #3a4050;
  --primary: #818cf8;
  --primary-hover: #a5b4fc;
  --primary-soft: #1e1b3a;
  --success: #4ade80;
  --success-soft: #14241c;
  --warning: #fbbf24;
  --warning-soft: #2a2118;
  --danger: #f87171;
  --danger-soft: #2c1818;
  --accent-blue: #60a5fa;
  --accent-blue-soft: #1a2540;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

/* ============ 全局重置 ============ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Hiragino Sans GB", "Microsoft YaHei", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============ 顶部栏 ============ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 60px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; z-index: 100;
}
.topbar-title {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 16px; white-space: nowrap;
}
.topbar-title .logo { font-size: 22px; }
.topbar-progress {
  flex: 1; max-width: 320px;
  display: flex; align-items: center; gap: 10px;
}
.topbar-progress-bar {
  flex: 1; height: 8px; background: var(--bg-soft);
  border-radius: 4px; overflow: hidden;
}
.topbar-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent-blue));
  border-radius: 4px; transition: width 0.4s ease;
  width: 0%;
}
.topbar-progress-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.topbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.topbar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-secondary);
  transition: all 0.15s;
}
.topbar-btn:hover { background: var(--bg-soft); color: var(--text); }
.topbar-btn .icon { font-size: 15px; }
.topbar-search { position: relative; }
.topbar-search input {
  width: 200px; padding: 7px 12px 7px 32px;
  background: var(--bg-soft); border: 1px solid transparent;
  border-radius: var(--radius-sm); color: var(--text); font-size: 13px;
  transition: all 0.15s;
}
.topbar-search input:focus {
  outline: none; border-color: var(--primary); background: var(--bg-elevated);
  width: 260px;
}
.topbar-search .icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: var(--text-muted);
}

/* ============ 主体布局 ============ */
.layout {
  display: flex; padding-top: 60px; min-height: 100vh;
}

/* ============ 侧边栏 ============ */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  position: fixed; top: 60px; bottom: 0; left: 0;
  overflow-y: auto; padding: 20px 0;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.sidebar-section { margin-bottom: 4px; }
.sidebar-module {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  transition: all 0.15s; user-select: none;
}
.sidebar-module:hover { background: var(--bg-soft); color: var(--text); }
.sidebar-module .dot { font-size: 11px; }
.sidebar-module .arrow { font-size: 10px; transition: transform 0.2s; color: var(--text-muted); }
.sidebar-module.collapsed .arrow { transform: rotate(-90deg); }
.sidebar-module .module-label {
  flex: 1; display: flex; flex-direction: column;
}
.sidebar-module .module-title { color: inherit; }
.sidebar-module .module-meta { font-size: 11px; font-weight: 400; color: var(--text-muted); margin-top: 1px; }
.sidebar-lessons { overflow: hidden; transition: max-height 0.3s ease; }
.sidebar-section.collapsed .sidebar-lessons { max-height: 0 !important; }
.sidebar-lesson {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px 8px 44px;
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-lesson:hover { background: var(--bg-soft); color: var(--text); }
.sidebar-lesson.active {
  background: var(--primary-soft); color: var(--primary);
  border-left-color: var(--primary); font-weight: 600;
}
.sidebar-lesson .status {
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0; border: 1.5px solid var(--border-strong);
  background: transparent;
}
.sidebar-lesson.completed .status {
  background: var(--success); border-color: var(--success); color: white;
}
.sidebar-lesson.completed .status::before { content: "✓"; }
.sidebar-lesson .num {
  font-size: 11px; color: var(--text-muted);
  min-width: 24px; font-variant-numeric: tabular-nums;
}
.sidebar-lesson.active .num { color: inherit; }

/* ============ 内容区 ============ */
.content {
  flex: 1; margin-left: var(--sidebar-w); padding: 40px 24px 80px;
  display: flex; justify-content: center;
}
.content-inner { max-width: 820px; width: 100%; }

/* 课时头部 */
.lesson-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.lesson-breadcrumb {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
}
.lesson-breadcrumb .sep { opacity: 0.5; }
.lesson-title {
  font-size: 32px; font-weight: 800; line-height: 1.3; margin-bottom: 14px;
  background: linear-gradient(135deg, var(--text), var(--text-secondary));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.lesson-meta {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.meta-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.meta-tag.difficulty { background: var(--warning-soft); color: var(--warning); }
.meta-tag.duration { background: var(--bg-soft); color: var(--text-secondary); }
.meta-tag.goal {
  background: var(--primary-soft); color: var(--primary);
  padding: 4px 12px; font-weight: 600;
}
.lesson-goal {
  margin-top: 16px; padding: 14px 16px;
  background: var(--primary-soft); border-left: 3px solid var(--primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 14px; color: var(--text);
}
.lesson-goal strong { color: var(--primary); }

/* Markdown 正文样式 */
.lesson-body { font-size: 15px; line-height: 1.8; color: var(--text); }
.lesson-body h2 {
  font-size: 22px; font-weight: 700; margin: 40px 0 16px;
  padding-top: 8px; position: relative;
}
.lesson-body h2::before {
  content: ""; position: absolute; left: -14px; top: 12px;
  width: 4px; height: 22px;
  background: linear-gradient(180deg, var(--primary), var(--accent-blue));
  border-radius: 2px;
}
.lesson-body h3 {
  font-size: 17px; font-weight: 600; margin: 28px 0 12px;
  color: var(--text);
}
.lesson-body h4 {
  font-size: 15px; font-weight: 600; margin: 22px 0 10px;
  color: var(--text-secondary);
}
.lesson-body p { margin: 14px 0; }
.lesson-body ul, .lesson-body ol { margin: 14px 0; padding-left: 26px; }
.lesson-body li { margin: 6px 0; }
.lesson-body li::marker { color: var(--primary); }
.lesson-body strong { color: var(--text); font-weight: 700; }
.lesson-body em { font-style: italic; color: var(--text-secondary); }
.lesson-body blockquote {
  margin: 18px 0; padding: 14px 18px;
  background: var(--bg-soft); border-left: 3px solid var(--border-strong);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-secondary);
}
.lesson-body blockquote p { margin: 6px 0; }
.lesson-body blockquote strong { color: var(--text); }
.lesson-body code {
  font-family: "SF Mono", "Cascadia Code", Consolas, "Courier New", monospace;
  font-size: 13px; padding: 2px 6px;
  background: var(--bg-code); border-radius: 4px;
  color: var(--danger);
}
.lesson-body pre {
  margin: 16px 0; padding: 16px 18px;
  background: var(--bg-code); border: 1px solid var(--border);
  border-radius: var(--radius-md); overflow-x: auto;
}
.lesson-body pre code {
  background: transparent; padding: 0; color: var(--text);
  font-size: 13px; line-height: 1.6;
}
/* 代码块里的中文翻译注释 */
.lesson-body pre code .cmt {
  color: var(--success); font-style: italic; font-size: 12.5px;
  font-family: inherit; /* 中文不用等宽字体 */
}
/* 表格/段落里的英文原文 + 中文对照 */
.lesson-body td .en { color: var(--text); }
.lesson-body td .cmt, .lesson-body p .cmt {
  display: block; color: var(--text-secondary); font-size: 13px;
  margin-top: 3px; font-style: italic;
}
.lesson-body hr {
  margin: 32px 0; border: none; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
}
.lesson-body a { color: var(--accent-blue); }
.lesson-body table {
  width: 100%; border-collapse: collapse; margin: 18px 0;
  font-size: 14px; box-shadow: var(--shadow-sm);
  border-radius: var(--radius-md); overflow: hidden;
}
.lesson-body th {
  background: var(--bg-soft); text-align: left;
  padding: 10px 14px; font-weight: 600;
  border-bottom: 2px solid var(--border-strong);
  color: var(--text);
}
.lesson-body td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.lesson-body tr:last-child td { border-bottom: none; }
.lesson-body tr:hover td { background: var(--bg-soft); }

/* 自定义组件 —— 卡片紧凑化，避免正文 line-height 撑出大片空白 */
.callout {
  margin: 16px 0; padding: 10px 14px;
  border-radius: var(--radius-md);
  border-left: 4px solid;
  display: flex; gap: 10px;
  align-items: flex-start;
  line-height: 1.55;            /* 覆盖正文 1.8，卡片内更紧凑 */
}
.callout .icon {
  font-size: 15px; flex-shrink: 0;
  line-height: 1.55;            /* 与文本基线对齐，不再撑高 */
  margin-top: 2px;
}
.callout .callout-body { flex: 1; padding: 0; }
/* 卡片内重置段落/列表的 margin，避免继承正文 14px 上边距 */
.callout .callout-body > *:first-child { margin-top: 0 !important; }
.callout .callout-body > *:last-child { margin-bottom: 0 !important; }
.callout .callout-body p { margin: 4px 0; }
.callout .callout-body ul, .callout .callout-body ol { margin: 4px 0; padding-left: 22px; }
.callout .callout-body li { margin: 2px 0; }
.callout.tip { background: var(--success-soft); border-color: var(--success); }
.callout.warn { background: var(--warning-soft); border-color: var(--warning); }
.callout.danger { background: var(--danger-soft); border-color: var(--danger); }
.callout.info { background: var(--accent-blue-soft); border-color: var(--accent-blue); }
.callout.key { background: var(--primary-soft); border-color: var(--primary); }
.callout-title { font-weight: 700; margin-bottom: 2px; }

.badge-good, .badge-bad {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 12px; font-weight: 600; margin-right: 6px;
}
.badge-good { background: var(--success-soft); color: var(--success); }
.badge-bad { background: var(--danger-soft); color: var(--danger); }

/* 作业区 */
.homework {
  margin: 32px 0 24px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.homework-header {
  padding: 14px 20px; background: var(--primary-soft);
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; color: var(--primary); font-size: 15px;
}
.homework-body { padding: 20px; }
.homework-body p { margin: 10px 0; }
.homework-prompt {
  background: var(--bg-soft); padding: 12px 14px;
  border-radius: var(--radius-sm); margin: 12px 0;
  font-size: 14px;
}
.homework-textarea {
  width: 100%; min-height: 120px; margin-top: 12px;
  padding: 12px; background: var(--bg);
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.6;
  resize: vertical; transition: border 0.15s;
}
.homework-textarea:focus { outline: none; border-color: var(--primary); }
.homework-actions {
  display: flex; gap: 10px; margin-top: 12px;
  align-items: center;
}
.btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: var(--bg-soft); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--border); color: var(--text); }
.homework-saved {
  font-size: 12px; color: var(--success);
  opacity: 0; transition: opacity 0.3s;
}
.homework-saved.show { opacity: 1; }

/* ============ 选择题样式 ============ */
.hw-type {
  display: inline-block; margin-left: 10px;
  padding: 2px 8px; background: var(--bg-elevated);
  color: var(--text-secondary); font-size: 11px; font-weight: 500;
  border-radius: 10px; vertical-align: middle;
}
.choice-list { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
.choice-option {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; background: var(--bg);
  border: 1.5px solid var(--border); border-radius: var(--radius-md);
  cursor: pointer; transition: all 0.15s;
  position: relative; user-select: none;
}
.choice-option:hover { border-color: var(--primary); background: var(--primary-soft); }
.choice-option input { position: absolute; opacity: 0; pointer-events: none; }
.choice-marker {
  flex-shrink: 0; width: 20px; height: 20px;
  border: 1.5px solid var(--border-strong); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: transparent;
  transition: all 0.15s; margin-top: 1px;
}
.choice-marker-check {
  position: absolute; left: 24px; top: 14px;
  color: white; font-size: 12px; font-weight: bold;
  opacity: 0; transition: opacity 0.15s;
}
.choice-label { flex: 1; font-size: 14px; line-height: 1.55; color: var(--text); }

/* 选中态 */
.choice-option.selected {
  border-color: var(--primary); background: var(--primary-soft);
}
.choice-option.selected .choice-marker {
  background: var(--primary); border-color: var(--primary);
}
.choice-option.selected .choice-marker-check { opacity: 1; }
/* 单选时 marker 显示圆形 */
.choice-option input[type="radio"] ~ .choice-marker { border-radius: 50%; }
.choice-option input[type="radio"] ~ .choice-marker-check { left: 25px; }

/* 揭示答案后的状态 */
.choice-option.revealed { cursor: default; }
.choice-option.revealed:hover { background: var(--bg); border-color: var(--border); }
.choice-option.correct {
  border-color: var(--success); background: var(--success-soft);
}
.choice-option.correct .choice-marker,
.choice-option.correct .choice-marker-check + * { color: var(--success); }
.choice-option.correct .choice-result { display: inline-flex; }
.choice-option.wrong {
  border-color: var(--danger); background: var(--danger-soft);
}
.choice-option.wrong .choice-marker { background: var(--danger); border-color: var(--danger); }
.choice-option.wrong .choice-marker-check { opacity: 1; }
.choice-option.wrong .choice-result { display: inline-flex; }
.choice-option.dim { opacity: 0.55; }
.choice-option.dim:hover { opacity: 1; }

.choice-result {
  display: none; flex-shrink: 0;
  align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
  margin-left: auto;
}
.choice-option.correct .choice-result { background: var(--success); color: white; }
.choice-option.wrong .choice-result { background: var(--danger); color: white; }

/* 解释区 */
.choice-explanations {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, margin 0.3s;
  margin-top: 0;
}
.choice-explanations.show {
  max-height: 3000px; margin-top: 16px;
}
.choice-result-summary {
  padding: 14px 16px; background: var(--bg-soft);
  border-radius: var(--radius-md); margin-bottom: 14px;
  border-left: 3px solid var(--primary);
}
.result-score {
  font-size: 17px; font-weight: 700; margin-bottom: 6px;
}
.result-score.perfect { color: var(--success); }
.result-score.partial { color: var(--warning); }
.result-score.wrong { color: var(--danger); }
.result-correct-answer, .result-your-answer {
  font-size: 13px; color: var(--text-secondary); margin-top: 2px;
}
.choice-explanation-list { display: flex; flex-direction: column; gap: 10px; }
.choice-explanation {
  padding: 12px 14px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--bg-elevated);
  border-left: 3px solid var(--border-strong);
}
.choice-explanation.is-correct { border-left-color: var(--success); }
.choice-explanation.is-wrong-pick { border-left-color: var(--danger); background: var(--danger-soft); }
.choice-explanation.is-correct-skip { border-left-color: var(--success); opacity: 0.85; }
.ce-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.ce-badge {
  font-weight: 700; font-size: 13px;
}
.ce-badge.good { color: var(--success); }
.ce-badge.bad { color: var(--danger); }
.ce-you {
  font-size: 11px; padding: 1px 7px; border-radius: 8px;
  background: var(--danger-soft); color: var(--danger); font-weight: 600;
}
.ce-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.5; }
.ce-explain { font-size: 14px; line-height: 1.65; color: var(--text); }
.ce-explain strong { color: var(--text); }
.choice-summary {
  margin-top: 14px; padding: 12px 14px;
  background: var(--primary-soft); border-left: 3px solid var(--primary);
  border-radius: var(--radius-md);
  font-size: 14px; line-height: 1.65;
}
.btn:disabled { opacity: 0.6; cursor: default; }


/* 导航 */
.lesson-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 48px; padding-top: 24px;
  border-top: 1px solid var(--border); gap: 12px;
}
.nav-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border: 1px solid var(--border-strong);
  border-radius: var(--radius-md); font-size: 13px;
  background: var(--bg-elevated); color: var(--text);
  transition: all 0.15s; max-width: 48%;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--primary); color: var(--primary);
  box-shadow: var(--shadow-sm);
}

<h2>二、skill 解决了 4 个核心问题</h2>

<h3>🩹 问题 1：健忘 → skill 让流程"持久化"</h3>
<p>你每次开会都要重复说一遍"修 bug 前先复现"。有了 skill，这句话被写进 <code>systematic-debugging/SKILL.md</code>（systematic = 系统化的，debugging = 调试找错）这个<strong>文件</strong>里。</p>

If you think there is even a 1% chance a skill might apply

&lt;/EXTREMELY-IMPORTANT&gt;</code></pre>

<p>注意这些关键词的语气（每一个都在给 AI 下"死命令"）：</p>
<table>
<thead><tr><th>英文原文</th><th>中文意思</th><th>为什么这么写</th></tr></thead>
<tbody>
<tr><td><code>ABSOLUTELY MUST</code></td><td>绝对必须</td><td>不留余地</td></tr>
<tr><td><code>DO NOT HAVE A CHOICE</code></td><td>你别无选择</td><td>剥夺 AI 的"选择权"</td></tr>

<p><strong>为什么这么凶？</strong>因为作者 Jesse Vincent（superpowers 项目作者）测试发现，如果你只温和地说"建议使用 skill"，AI 会找各种借口跳过：</p>
<ul>

<p>所以 skill 用<strong>全大写 + 自定义 XML 标签 + 反例对照表</strong>，把 AI 可能想到的每一个偷懒借口都堵死。下面这张表叫 <strong>Red Flags（红旗警告表）</strong>——专门列出 AI 可能用来偷懒的"念头"，以及对应的"现实"：</p>
<table>
<thead><tr><th>Thought（AI 心里的偷懒念头）</th><th>Reality（现实）</th></tr></thead>

</tr>
<tr>
  <td><span class="en">"I remember this skill"</span><br><span class="cmt">"我记得这个 skill"</span></td>

<ul>

<p>skill 的解法是 <strong>"渐进式披露"（Progressive Disclosure，渐进 = 一步步来，披露 = 透露信息）</strong>：</p>
<ul>
  <li>会话启动时只加载一个<strong>入口 skill</strong>（<code>using-superpowers</code>，787 词）</li>

<div class="callout info"><span class="icon">📌</span><div class="callout-body"><strong>核心区别</strong>：普通 prompt 是"临场指挥"，skill 是"写进员工手册的制度"。</div></div>

<h2>四、superpowers 的设计哲学</h2>
<p>看 <code>session-start</code>（会话启动时跑的脚本，hook = 钩子）这个 hook 脚本第 35 行，注意它注入上下文时用的话术：</p>
<pre><code>session_context="&lt;EXTREMELY_IMPORTANT&gt;     <span class="cmt">← 「极其重要」标签</span>
You have superpowers.
<span class="cmt">↑ 译文：你拥有超能力。</span>

**Below is the full content of your 'superpowers:using-superpowers' skill...**
<span class="cmt">↑ 译文：下面是你的 'superpowers:using-superpowers' skill 的完整内容……</span>
"</code></pre>
<p><strong>"You have superpowers."（你拥有超能力）</strong> —— 这句话不是给用户看的，是给 AI 看的。</p>
<p>它传达了 superpowers 整个项目的核心信念：</p>
<div class="callout key"><div class="callout-body">
<p>AI Agent 不是"差生需要补课"，而是"优等生需要好的工作手册"。</p>
<p>问题不在于 AI 不够聪明，而在于：</p>
<ol>
  <li>它没有持久记忆</li>
  <li>它默认走阻力最小的路（哪怕那条路是错的）</li>
  <li>把所有规则一次性灌给它，反而会稀释它的注意力</li>
</ol>
<p>skill 就是同时解决这三个问题的工具。</p>
</div></div>

<h2>五、本课要点总结</h2>
<div class="callout key"><div class="callout-body">
<ol>
  <li><strong>skill 是持久化的最佳实践</strong>——从你脑子里搬到磁盘上。</li>
  <li><strong>skill 是带防御机制的说明书</strong>——预设 AI 会偷懒，提前堵死。</li>
  <li><strong>skill 是可复用的行为模式</strong>——一次定义，跨项目跨会话生效。</li>
  <li><strong>skill 是按需加载的</strong>——入口常驻、章节按需翻，省 token 又不稀释注意力。</li>
</ol>
</div></div>

<h2>二、SKILL.md 的两大块结构</h2>
<p>打开任何一个 <code>SKILL.md</code>，它的内容永远分成两块：</p>

<thead><tr><th>区块</th><th>位置</th><th>作用</th><th>类比</th></tr></thead>
<tbody>
<tr>
  <td><strong>① frontmatter</strong><br><span class="cmt">「前置元数据」</span></td>

</tbody>
</table>

<div class="callout info"><span class="icon">📌</span><div class="callout-body"><strong>记忆方法</strong>：frontmatter（front = 前，matter = 事情）= "文件开头那点事"；body = "身体/主体"。就像一个人：frontmatter 是<strong>名片</strong>（名字+怎么找到你），body 是<strong>真人</strong>（具体能干什么活）。</div></div>

<h2>三、解剖第一块：frontmatter（名片）</h2>
<p>看 <code>using-superpowers/SKILL.md</code> 真实的开头 4 行：</p>
<pre><code>---
name: using-superpowers
description: Use when starting any conversation - establishes how to find
  and use skills, requiring Skill tool invocation before any response
  including clarifying questions
---</code></pre>

<p>逐行翻译这个 frontmatter：</p>
<table>
<thead><tr><th>行</th><th>内容</th><th>中文意思</th><th>作用</th></tr></thead>
<tbody>
<tr>
  <td>第 1 行</td>
  <td><code>---</code></td>
  <td>三条横线</td>
  <td>frontmatter 的<strong>起始标记</strong>（必须）</td>
</tr>
<tr>
  <td>第 2 行</td>
  <td><code>name: using-superpowers</code></td>
  <td>名字：using-superpowers</td>
  <td>声明这个 skill 叫什么（= 文件夹名）</td>
</tr>
<tr>
  <td>第 3-5 行</td>
  <td><code>description: ...</code></td>
  <td>描述：（一段英文）</td>

</tr>
<tr>

</tr>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">
<p><strong>本课最重要的一个知识点（先记住结论，后面会反复用）：</strong></p>
<p>frontmatter 里<strong>只有两个字段是必须的</strong>：<code>name</code> 和 <code>description</code>。其他的（比如 <code>allowed-tools</code>、<code>version</code>、<code>author</code>）都是<strong>可选</strong>的，甚至<strong>不推荐</strong>写。</p>
<p>superpowers 的 14 个 skill，<strong>每一个</strong>的 frontmatter 都只有这两行。这就是<strong>"两行黄金法则"</strong>（下一节课的标题）。</p>

<h2>四、解剖第二块：body（正文）</h2>
<p>看 <code>using-superpowers/SKILL.md</code> 正文的结构（我做了个章节地图）：</p>
<pre><code>body 正文结构（从上到下）：
┌─────────────────────────────────────────────────┐
│ ① 自定义 XML 标签（强制指令）                       │   <span class="cmt">第 6-16 行</span>
│   &lt;SUBAGENT-STOP&gt;...&lt;/SUBAGENT-STOP&gt;             │
│   &lt;EXTREMELY-IMPORTANT&gt;...&lt;/EXTREMELY-IMPORTANT&gt; │
├─────────────────────────────────────────────────┤
│ ② Instruction Priority（指令优先级）              │   <span class="cmt">用一级标题 ##</span>
│   用户指令 &gt; Superpowers &gt; 默认系统提示           │
├─────────────────────────────────────────────────┤
│ ③ How to Access Skills（如何访问 skill）          │   <span class="cmt">按平台分小节</span>
│   Claude Code / Copilot CLI / Gemini CLI         │
├─────────────────────────────────────────────────┤
│ ④ Using Skills - The Rule（核心规则）             │   <span class="cmt">主章节</span>
│   - 流程图（dot 流程图）                          │
│   - Red Flags 表（偷懒念头对照表）                │
│   - Skill Priority（优先级）                      │
│   - Skill Types（Rigid vs Flexible）              │
└─────────────────────────────────────────────────┘</code></pre>

<p>你会发现，body 的写法和普通 Markdown 文章<strong>几乎一样</strong>——用 <code>#</code> <code>##</code> <code>###</code> 做标题，用 <code>-</code> 做列表，用 <code>|...|</code> 做表格。但 superpowers 用了 3 个"特殊武器"，让 body 不只是普通文档：</p>

<h3>特殊武器 1：自定义 XML 标签</h3>
<p>看正文最开头：</p>
<pre><code>&lt;SUBAGENT-STOP&gt;
If you were dispatched as a subagent to execute a specific task,
skip this skill.
&lt;/SUBAGENT-STOP&gt;</code></pre>
<p><span class="cmt">译文：&lt;子代理停止&gt; 如果你被派来作为子代理执行特定任务，跳过这个 skill。&lt;/子代理停止&gt;</span></p>
<p>这个 <code>&lt;SUBAGENT-STOP&gt;</code> 是作者<strong>自己发明的</strong>标签（HTML 里根本没这个标签）。它的作用是：用一个醒目的"盒子"包住一段<strong>必须执行的指令</strong>，让 AI 一眼看到就重视。下一节课我们会专门讲怎么用这种标签。</p>

<h3>特殊武器 2：dot 流程图</h3>
<p>正文第 48-76 行画了一张流程图（用的是 Graphviz 的 dot 语言，但你不用现在就懂语法）：</p>
<pre><code>digraph skill_flow {
    "User message received"          <span class="cmt">← 起点：收到用户消息</span>
    "Might any skill apply?"         <span class="cmt">← 判断：可能用到 skill 吗？</span>
    "Invoke Skill tool"              <span class="cmt">← 动作：调用 Skill 工具</span>
    "Respond"                        <span class="cmt">← 终点：回复</span>

    "User message received" -> "Might any skill apply?"
    "Might any skill apply?" -> "Invoke Skill tool" [label="yes, even 1%"]
    <span class="cmt">↑ 译文：哪怕只有 1% 可能用到，也要去调用</span>
    "Might any skill apply?" -> "Respond" [label="definitely not"]
    <span class="cmt">↑ 译文：如果"绝对不可能"，才直接回复</span>
}</code></pre>
<p>这张图回答了一个核心问题："AI 收到用户消息后，到底什么时候才该去查 skill？" 答案是：<strong>哪怕只有 1% 可能，也要查</strong>。流程图比文字描述更适合表达这种"判断分支"。</p>

<h3>特殊武器 3：Red Flags 对照表</h3>
<p>我们在第 1.1 课已经见过它了，这里再看一眼：</p>
<table>
<thead><tr><th>Thought（AI 心里的偷懒念头）</th><th>Reality（现实）</th></tr></thead>
<tbody>
<tr>
  <td><span class="en">"This is just a simple question"</span><br><span class="cmt">"这只是个简单问题"</span></td>
  <td><span class="en">Questions are tasks. Check for skills.</span><br><span class="cmt">问题也是任务。先查有没有 skill。</span></td>
</tr>
<tr>
  <td><span class="en">"Let me explore the codebase first"</span><br><span class="cmt">"让我先探索一下代码库"</span></td>
  <td><span class="en">Skills tell you HOW to explore. Check first.</span><br><span class="cmt">skill 告诉你"怎么探索"。先查 skill。</span></td>
</tr>
</tbody>
</table>
<p>这种"两列对照表"是 superpowers 最常用的武器——左列列出 AI 可能的偷懒念头，右列直接打脸。<strong>表格比段落更有冲击力</strong>，因为 AI 一眼就能扫完所有"借口"。</p>

<h2>六、对比：复杂 skill 长什么样？</h2>
<p>为了让你看到"skill 可以有多复杂"，我们看一眼 superpowers 里<strong>最大</strong>的那个 skill —— <code>writing-skills</code>（教你怎么写 skill 的元 skill）的目录：</p>
<pre><code>writing-skills/                     <span class="cmt">← 一个复杂的 skill</span>
├── SKILL.md                        <span class="cmt">← 主体（655 行！）</span>
├── anthropic-best-practices.md     <span class="cmt">← Anthropic 官方最佳实践汇编</span>
├── testing-skills-with-subagents.md <span class="cmt">← 用子代理测试 skill 的方法</span>
├── persuasion-principles.md        <span class="cmt">← 说服心理学 7 原则</span>
├── graphviz-conventions.dot        <span class="cmt">← 画流程图的规范文件</span>
├── render-graphs.js                <span class="cmt">← 一个 Node.js 脚本</span>
└── examples/                       <span class="cmt">← 示例目录</span>
    └── CLAUDE_MD_TESTING.md        <span class="cmt">← 一个真实 A/B 测试案例</span></code></pre>
<p>它带了一堆"附件"：参考文档、脚本、示例。但<strong>核心还是那个 SKILL.md</strong>——其他文件都是被 SKILL.md <strong>引用</strong>进来的"参考材料"。</p>

<div class="callout key"><div class="callout-body">
<p><strong>这是 superpowers 最聪明的设计之一，叫"渐进式披露"（Progressive Disclosure，第 1.1 课讲过）：</strong></p>
<ul>
  <li>AI 默认<strong>只读 SKILL.md</strong>（小而精）</li>
  <li>当 SKILL.md 里说"具体细节见 xxx.md"时，AI 才会去读那个附件</li>
  <li>这样既能装下大量内容，又不会一次性把 AI 灌爆</li>
</ul>
<p>类比：SKILL.md 是<strong>教科书正文</strong>，references/ 里的文件是<strong>附录</strong>——你需要时才翻。</p>
</div></div>

<h2>七、本课要点总结</h2>

    body: `
<h2>一、frontmatter 是什么</h2>
<p>打开任何一个 SKILL.md，最上面都会有一段被三个减号 <code>---</code> 包起来的内容，长这样：</p>
<pre><code>---
name: brainstorming
description: "You MUST use this before any creative work..."
---

# Brainstorming Ideas Into Designs
（下面是正文...）
</code></pre>
<p>这一段就叫 <strong>frontmatter</strong>（frontmatter = 前置元数据，front = 前，matter = 内容）。它用的是 <strong>YAML</strong> 格式（YAML = 一种用缩进和冒号表达数据的配置格式，比 JSON 更适合人写），专门用来给这个文件贴"标签"——告诉系统这个 skill 叫什么、什么时候用。</p>
<p><code>---</code> 这一行就是 frontmatter 的"边界标记"：从第一个 <code>---</code> 到第二个 <code>---</code> 之间是元数据，第二个 <code>---</code> 之后才是给人/AI 看的正文。这个边界必须明确，否则系统会分不清哪是标签、哪是内容。</p>
<div class="callout info">
<span class="icon">📌</span>
<div class="callout-body">为什么用 YAML 而不是 JSON？因为 YAML 支持裸字符串（不用引号）、注释、多行文本，对人写友好得多。YAML 在配置文件领域几乎是无处不在的（Docker Compose、GitHub Actions 都用它）。</div>
</div>

<h2>二、两个字段：name 和 description</h2>
<p>superpowers 的<strong>铁律</strong>：frontmatter 里只写两个字段，多一个都不要。这就是本课标题说的"<strong>两行黄金法则</strong>"。</p>
<h3>字段 1：name（名字）</h3>
<p><code>name</code> 是这个 skill 的<strong>唯一标识符</strong>（identifier，identifier = 标识符，用来唯一指代某个东西的名字）。它必须满足：</p>
<ul>
<li><strong>等于文件夹名</strong>：文件夹叫 <code>brainstorming</code>，name 就必须是 <code>brainstorming</code>。两者必须一致。</li>
<li><strong>只用字母、数字、连字符</strong>（hyphen，hyphen = 连字符 "-"）：不能有空格、不能用下划线、不能用中文、不能用括号。</li>
<li><strong>全小写</strong>：写 <code>test-driven-development</code>，不写 <code>Test_Driven_Development</code>。</li>
</ul>
<h3>字段 2：description（描述）</h3>
<p><code>description</code> 是一句话，告诉 AI <strong>什么时候该用这个 skill</strong>。这条是整个 skill 最重要的一行——我们在 1.3 课讲过，AI 匹配 skill 靠的就是它。写法规则下一节课（2.2）会专门讲，这里先记住：<strong>以 <code>Use when...</code> 开头</strong>。</p>

<h2>三、为什么不写其他字段</h2>
<p>你可能会想：YAML 明明支持很多字段啊，为什么不顺手写上 <code>version</code>（版本）、<code>author</code>（作者）、<code>allowed-tools</code>（允许调用的工具）、<code>tags</code>（标签）？这样信息不是更全吗？</p>
<p>superpowers 作者 Jesse Vincent 的答案很明确：<strong>测试发现，多余字段会干扰 AI</strong>。</p>
<p>原因有几个：</p>
<ul>
<li><strong>每一行 frontmatter 都会被注入 context</strong>。frontmatter 越长，消耗的 token（token = AI 计费单位）越多，而其中大部分字段（author、version）对 AI 决策毫无帮助——纯粹是浪费。</li>
<li><strong>多余字段会让 AI 分心</strong>。AI 看到 <code>allowed-tools: [Bash, Read]</code> 这种字段，可能会误以为"这个 skill 只能用这两个工具"，或者去猜测这个字段的含义，反而偏离了正事。</li>
<li><strong>name 和 description 已经足够</strong>。AI 判断"要不要用这个 skill"只看这两个，其他字段对触发决策没有贡献。</li>
</ul>
<div class="callout key">
<span class="icon">💡</span>
<div class="callout-body">这就是"两行黄金法则"的本质：<strong>少即是多</strong>（less is more）。frontmatter 不是文档注释，它是触发器——只放触发必需的信息，其他全部省掉。</div>
</div>

<h2>四、字符限制：总共 max 1024 字符</h2>
<p>除了"只写两个字段"，还有一个硬性限制：frontmatter <strong>总字符数不能超过 1024</strong>（包括 <code>name:</code>、<code>description:</code> 这些键名和标点）。</p>
<p>为什么是 1024？因为这个数字是 agentskills.io 这个 skill 规范（specification）里规定的上限。系统在加载时会校验——超过 1024 字符的 frontmatter 会被拒绝或截断，skill 就注册不成功了。</p>
<p>实际写的时候，<code>name</code> 通常只有十几个字符，<code>description</code> 一般控制在 200-400 字符。1024 这个上限其实是<strong>很宽裕</strong>的，只要你不在 description 里写小作文，基本不会触顶。writing-skills 给的建议是：<code>description</code> 尽量控制在 500 字符以内。</p>
<div class="callout warn">
<span class="icon">⚠️</span>
<div class="callout-body">注意：1024 限制是<strong>整个 frontmatter</strong>，不是 description 单独 1024。如果你 name 写得长（虽然不该这样），description 能用的字符就更少。养成习惯：写完 frontmatter 后心里默算一下总长度。</div>
</div>

<h2>五、实例：superpowers 14 个 skill 的真实 frontmatter</h2>
<p>光说不练假把式。我们直接看 superpowers 里所有 14 个 skill 的 frontmatter，验证一下是不是真的都只有两行。</p>
<pre><code># brainstorming
---
name: brainstorming
description: "You MUST use this before any creative work..."
---

# using-superpowers
---
name: using-superpowers
description: Use when starting any conversation - establishes how to find and use skills...
---

# systematic-debugging
---
name: systematic-debugging
description: Use when encountering any bug, test failure, or unexpected behavior, before proposing fixes
---

# test-driven-development
---
name: test-driven-development
description: Use when implementing any feature or bugfix, before writing implementation code
---

# writing-plans
---
name: writing-plans
description: Use when you have a spec or requirements for a multi-step task, before touching code
---
<span class="cmt">// ... 其余 9 个 skill 全部同样的两行结构，无一例外</span>
</code></pre>
<p>你仔细看，会发现一个<strong>唯一的小例外</strong>：brainstorming 的 description 用了双引号包起来。为什么？因为它的内容里有特殊字符（<code>"You MUST..."</code> 这种带强调的写法），YAML 解析时需要用引号明确"这是一个完整的字符串"。这是 YAML 语法层面的需要，<strong>不是多了字段</strong>——它依然是 name + description 两个字段。</p>
<p>除此之外，14 个 skill <strong>无一例外</strong>都是干净的两行。这就是"黄金法则"的分量——作者自己 14 次都严格遵守，没有任何一次"破例"加个 version 或 author。</p>

<h2>六、反例：一个塞满字段的 frontmatter</h2>
<p>来看一个反面教材。新手如果"信息洁癖"发作，可能会写出这种 frontmatter：</p>
<pre><code>---

version: 2.1.3

created: 2025-03-15
tags: [debug, bug, fix, root-cause]
category: engineering

language: python

<p>看起来信息很全，对吧？但<strong>每一条都是错的</strong>：</p>
<table>
<tr><th>多余字段</th><th>为什么不该写</th></tr>
<tr><td><code>version / author / email / created</code></td><td>纯文档信息，对 AI 触发决策零贡献，白消耗 token。这些应该写在 git 提交记录或 README 里。</td></tr>

<tr><td><code>priority / enabled</code></td><td>这些是 plugin 系统的配置项，不该写在单个 skill 的 frontmatter 里。</td></tr>
<tr><td><code>language: python</code></td><td>把 skill 绑死在 Python——违反"description 技术无关"原则。</td></tr>
</table>
<p>更糟的是，这个 frontmatter 加起来已经<strong>超过 300 字符</strong>，再写正经的 description 就要逼近 1024 上限了。纯粹是给自己挖坑。</p>
<div class="callout tip">
<span class="icon">✅</span>
<div class="callout-body">正确做法：删掉所有多余字段，只留 name 和 description。把"作者/版本/标签"这些元信息放进 git、README，或者 skill 正文底部的注释里——唯独不要放进 frontmatter。</div>
</div>

<h2>一、为什么这一节要花整整一节课</h2>
<p>整个 SKILL.md 里，<strong>没有哪一行比 description 更重要</strong>。</p>
<p>原因我们在 1.3 课讲过：AI 决定"用不用这个 skill"，<strong>只看 description 这一行</strong>。name 只是个标识，正文要等命中后才读——而命中不命中，全看 description 写得好不好。一行写歪了，整个 skill 就成了摆设，正文写得再精彩都没人看。</p>
<p>而且 description 的写法<strong>反直觉</strong>。新手本能地想把它写成"这个 skill 是干什么的"——恰恰相反，superpowers 的规则是<strong>"只写什么时候用，绝不写它做什么"</strong>。这一节课就要把这个反直觉的规则彻底讲透。</p>

<h2>二、规则 1：以 "Use when..." 开头</h2>

</code></pre>
<p>为什么必须这样开头？因为 <code>Use when</code> 这三个字直接回答了 AI 心里最想问的问题：<strong>"我什么时候该想起这个 skill？"</strong></p>
<p>对比一下反面：</p>
<pre><code>❌ For async testing.
   <span class="cmt">// 没用 Use when，读起来像个标签，AI 不知道这是触发条件还是分类</span>

❌ A debugging helper.
   <span class="cmt">// 读起来像产品介绍，AI 不会把它当成"何时用我"的指令</span>
</code></pre>
<p><code>Use when</code> 是个<strong>语法信号</strong>——它告诉 AI"接下来是触发条件，请认真匹配"。养成习惯：description 第一行永远以这四个字开头。</p>

<h2>三、规则 2：只写触发条件，<strong>绝不</strong>总结流程</h2>
<p>这是 5 条规则里<strong>最反直觉、也最容易被违反</strong>的一条。我们要花最多篇幅讲它。</p>
<h3>3.1 规则本身</h3>
<p>description <strong>只能写"何时用"</strong>，<strong>绝对不能写"skill 内部会做什么"</strong>。哪怕只是一句话的流程概要，也不能写。</p>
<h3>3.2 为什么——一个真实的翻车案例</h3>
<p>superpowers 作者在 writing-skills 里记录了一个真实测试发现，这是理解这条规则的最佳材料。我们原汁原味看一遍：</p>
<blockquote>
<p>subagent-driven-development 这个 skill 的内部流程图（flowchart）里，明确要求<strong>每个任务后做两次 code review（代码审查）</strong>：第一次检查"是否符合作业规范"，第二次检查"代码质量"。</p>
<p>一开始，它的 description 是这样写的：</p>
<pre><code>❌ description: Use when executing plans - dispatches subagent per task
   with code review between tasks
   <span class="cmt">// 后半句"dispatches subagent per task with code review between tasks"
   // 是在总结流程</span>
</code></pre>
<p>测试结果：<strong>AI 只做了一次 review</strong>，而不是流程图要求的两次。为什么？因为 AI 读完 description 后，觉得"哦，我已经知道这个 skill 干嘛的了——派 subagent、中间做 review"，于是<strong>就跳过了读正文</strong>，直接照着 description 的"剧情提要"去做了。而 description 里写的是"code review between tasks"（任务之间做 review），单数，AI 理解成做一次就够了。</p>
<p>后来把 description 改成：</p>
<pre><code>✅ description: Use when executing implementation plans with
   independent tasks in the current session
   <span class="cmt">// 只写触发条件，完全不提流程</span>
</code></pre>
<p>测试结果：<strong>AI 终于老老实实去读正文了</strong>，看到流程图里要求两次 review，正确执行了两次。</p>
</blockquote>
<p>这个案例价值连城。它揭示了一个 AI 的"<strong>偷懒天性</strong>"：</p>
<div class="callout warn">
<span class="icon">⚠️</span>
<div class="callout-body"><strong>只要 description 里出现了流程信息，AI 就会把它当成"剧情提要"，照着 description 偷懒执行，跳过读正文。</strong> 正文里精心设计的细节（比如"做两次 review"）就全废了。description 变成了一个 AI 会走的"捷径"，而这条捷径是错的。</div>
</div>
<h3>3.3 这条规则的核心结论</h3>
<p><strong>description = 何时用，正文 = 怎么做</strong>。两者分工必须干净利落，不能混。description 是"门牌号"，正文是"房间里的东西"——门牌号上只写"会议室"，不写"会议室里有 8 把椅子、2 块白板"。否则别人就不进门了，站在门口看门牌号就以为自己知道了。</p>
<p>判断方法很简单：写完 description 后，逐字读一遍，<strong>把所有"会做什么"的动词都删掉</strong>（dispatches、writes、creates、performs、runs...）。如果删完之后什么都没剩，说明你写成了流程提要，要重写。</p>

<h2>四、规则 3：用第三人称</h2>
<p>description 是要被<strong>注入 system context（系统上下文）</strong>（系统上下文）的——也就是说，它会变成 AI"脑子里"的一条背景知识。所以它必须用<strong>客观的第三人称</strong>来写，像是 skill 在自我介绍，而不是 AI 在说话。</p>
<p>对比：</p>
<pre><code>❌ description: I can help you with async tests when they're flaky.
   <span class="cmt">// 第一人称 "I"——AI 读了会困惑："这是谁在说话？是我吗？"</span>

❌ description: You can use this to debug your code.
   <span class="cmt">// 第二人称 "You"——读起来像在对 AI 下命令，但语境不对</span>

✅ description: Use when tests have race conditions, timing dependencies,
   or pass/fail inconsistently.
   <span class="cmt">// 第三人称，客观陈述触发条件，没人称代词</span>
</code></pre>
<p>注意第三人称的标志：<strong>没有人称代词</strong>（I、you、we、my、your）。直接以 <code>Use when...</code> 或动词开头（如 <code>Processes...</code>）。读起来像产品说明书，不像对话。</p>

<h2>五、规则 4：写"症状"，不写"工具"</h2>
<p>这是一条关于"<strong>匹配精度</strong>"的规则。看两个例子：</p>
<pre><code>❌ description: Use when tests use setTimeout/sleep and are flaky.
   <span class="cmt">// 写了具体工具 setTimeout/sleep</span>

✅ description: Use when tests have race conditions, timing dependencies,
   or pass/fail inconsistently.
   <span class="cmt">// 写的是问题本质：race condition（竞态条件）</span>
</code></pre>
<p>这两个 description 看起来都在描述"测试不稳定"，但差别巨大：</p>
<ul>
<li>左边写 <code>setTimeout/sleep</code>——这是<strong>具体的工具/API</strong>。问题在于：用户可能用 <code>setInterval</code>、<code>requestAnimationFrame</code>、Python 的 <code>time.sleep</code>、Go 的 <code>time.After</code>... 这些都会导致同样的"竞态"问题，但因为 description 里只写了 setTimeout，<strong>这些情况 AI 都匹配不上</strong>。</li>
<li>右边写 <code>race conditions, timing dependencies</code>——这是<strong>问题的本质/症状</strong>。不管用户用什么工具导致竞态，都能匹配上。</li>
</ul>
<p>用户的语言是<strong>症状</strong>（"我的测试偶尔失败"），不是<strong>工具</strong>（"我用了 setTimeout"）。AI 匹配时，是用用户的自然语言去对 description——所以 description 必须用"症状语言"写，才能接得住用户的各种表达方式。</p>
<div class="callout key">
<span class="icon">💡</span>
<div class="callout-body">判断方法：写完 description，问自己——<strong>"用户会用什么词描述他的问题？"</strong> 用户说"测试不稳"、"偶尔挂"，不会说"我用了 setTimeout"。用用户的词，不要用工程师的诊断词。</div>
</div>

<h2>六、规则 5：技术无关（除非 skill 本身就是技术特定的）</h2>
<p>这条规则和规则 4 是一对。规则 4 说"别写工具"，规则 5 说"别绑技术栈"。但有一个<strong>重要例外</strong>：</p>
<blockquote>
<p>如果 skill <strong>本身就是讲某个具体技术</strong>的，那就在 description 里明确写出这个技术。</p>
</blockquote>
<p>对比：</p>
<pre><code>✅ 通用 skill（condition-based-waiting）：
   description: Use when tests have race conditions, timing dependencies...
   <span class="cmt">// 不绑技术，因为它讲的是"条件等待"这个通用方法</span>

✅ 技术特定 skill（虚构例子）：
   description: Use when using React Router and handling authentication redirects.
   <span class="cmt">// 明确写 React Router，因为这个 skill 就是讲 React Router 的</span>
</code></pre>
<p>怎么判断该用哪种？问自己：<strong>"这个 skill 换一门技术/框架，还成立吗？"</strong></p>
<ul>
<li>"条件等待"换成 Python 测试、Rust 测试、Go 测试都适用 → <strong>通用</strong>，不写技术。</li>
<li>"用 React Router 处理认证跳转"换成 Vue Router 就完全是另一套 → <strong>技术特定</strong>，必须写明。</li>
</ul>
<p>superpowers 里 using-git-worktrees 就是技术特定的好例子——它的 description 里明确写了 <code>git worktree</code> 和 <code>native tools</code>，因为这个 skill 本来就是讲工作区隔离工具的。</p>

<h2>七、CSO：Claude Search Optimization</h2>
<p>5 条规则讲完了，再讲一个进阶技巧：<strong>CSO</strong>（CSO = Claude Search Optimization，让 AI 更容易"搜到"你的 skill）。这个概念是把"搜索引擎优化（SEO）"的思路搬过来——AI 在匹配 description 时，本质是在做检索，所以你要<strong>铺关键词</strong>。</p>
<p>CSO 的核心做法有 4 类：</p>
<h3>7.1 错误信息关键词</h3>

<h3>7.2 症状词</h3>
<p>把描述问题的形容词/动词写进去：<code>flaky</code>（不稳定）、<code>hanging</code>（卡住）、<code>zombie</code>（僵尸进程）、<code>pollution</code>（污染）。用户说"我的测试 flaky"时，AI 立刻匹配。</p>
<h3>7.3 同义词</h3>

<h3>7.4 工具/库名</h3>
<p>如果 skill 和某个工具强相关，把工具名写出来：<code>git worktree</code>、<code>React Router</code>。但注意——这只在 skill 真的技术特定时才做（呼应规则 5）。</p>

<p><strong>什么时候写</strong>：有真实数据时写；没有就跳过，不要编造。</p>

<h2>十、何时该用流程图（flowchart）</h2>
<p>很多新手一上来就想给 skill 画流程图。但 writing-skills 明确说：<strong>流程图是特殊工具，不是默认选择</strong>。</p>
<p><strong>只在以下三种情况用流程图</strong>：</p>
<ul>
<li><strong>非显然的决策点</strong>（non-obvious decision）：AI 可能选错路的时候。比如"3 次修复都失败后，是继续试还是质疑架构？"</li>
<li><strong>可能提前退出的循环</strong>（process loop）：AI 可能"半途觉得够了"就停的时候。比如 brainstorming 里"用户批准设计了吗？没批准就回到提方案"。</li>
<li><strong>A vs B 的选择</strong>：需要在两个方案间抉择的时候。</li>
</ul>
<p><strong>这三种情况绝对不要用流程图</strong>：</p>
<ul>
<li><strong>参考材料</strong>（reference）→ 用表格或列表</li>
<li><strong>代码示例</strong>（code examples）→ 用 <code><pre><code></code> 块</li>
<li><strong>线性步骤</strong>（linear instructions）→ 用有序列表（1. 2. 3.）</li>
</ul>
<div class="callout warn">
<span class="icon">⚠️</span>
<div class="callout-body"><strong>反模式（anti-pattern）警告</strong>：两种最常见的流程图滥用——① <strong>把代码塞进流程图</strong>（用 <code>step1 [label="import fs"]</code> 这种节点表示代码行），代码没法复制粘贴、没法读；② <strong>用无意义标签</strong>（helper1、step3、pattern4 这种），标签必须要有语义，让 AI 一眼看出"这一步在干嘛"。</div>
</div>

<h2>一、为什么目录结构是个问题</h2>
<p>前面几节课我们一直在讲 SKILL.md 这个文件本身——它的 frontmatter、它的 body 章节。但一个 skill 不一定只有 SKILL.md 这一个文件。复杂的时候，一个 skill 可能是一个<strong>文件夹</strong>，里面有好几个文件。</p>

<h2>二、模式 1：Self-Contained（自包含）</h2>
<h3>2.1 长什么样</h3>

</code></pre>

<li>内容简单、篇幅不长（通常 SKILL.md 在 500 行以内）</li>
<li>没有 heavy reference（heavy reference（重型参考材料） = 大段参考材料，如 API 文档、详细规范）</li>
<li>没有可复用的脚本工具</li>
<li>讲的是<strong>原则、概念、思维模式</strong>，不是具体技术细节</li>
</ul>
<p>defense-in-depth（defense-in-depth = 纵深防御，一种在多个层级加校验的编程思想）就是典型——它讲的是一个思维模式，内容不多，全塞进 SKILL.md 就够了。</p>
<h3>2.3 优点</h3>
<p>简单、清晰、AI 一读就完事。superpowers 14 个 skill 里<strong>大部分都是这种模式</strong>——因为 superpowers 主要讲流程和纪律，不堆技术细节。</p>
<div class="callout tip">
<span class="icon">✅</span>
<div class="callout-body">如果你犹豫该用哪种模式，<strong>默认选 Self-Contained</strong>。只有当 SKILL.md 真的长到装不下、或有明确的复用需求时，才考虑拆。</div>
</div>

<h2>三、模式 2：Skill with Reusable Tool（带可复用工具）</h2>
<h3>3.1 长什么样</h3>
<p>SKILL.md + 一个或几个<strong>脚本/工具文件</strong>。</p>
<pre><code>condition-based-waiting/
├── SKILL.md      <span class="cmt"># 概述 + 模式讲解</span>
└── example.ts    <span class="cmt"># 可直接改用的工具代码</span>
</code></pre>
<h3>3.2 适用场景</h3>
<ul>
<li>skill 教的是一个<strong>需要代码实现</strong>的技巧</li>
<li>那段代码<strong>可以被复用</strong>（不是一次性的示例，而是用户能直接拿来改的工具）</li>
<li>代码量适中（单个文件几十到一两百行）</li>
</ul>
<p>condition-based-waiting（condition-based-waiting = 用条件轮询代替固定 sleep 的技巧）就是典型。它教的是"怎么写一个等条件的 helper 函数"，所以带了一个 example.ts——用户可以直接复制这个文件、改成自己的场景用。</p>
<h3>3.3 关键区别：脚本 vs 示例代码</h3>
<p>注意"工具脚本"和"示例代码"不是一回事：</p>
<ul>
<li><strong>示例代码</strong>：是为了说明概念，通常 < 50 行，<strong>内联</strong>在 SKILL.md 里用 <code><pre><code></code> 包起来。</li>
<li><strong>工具脚本</strong>：是<strong>可执行、可复用</strong>的独立文件，用户会真的去跑它或改它。比如 condition-based-waiting/example.ts、writing-skills/render-graphs.js。</li>
</ul>
<p>如果你的代码只是"举个例子"，内联就行；如果代码是个"工具"，才拆成独立文件。</p>

<h2>四、模式 3：Skill with Heavy Reference（带重型参考材料）</h2>
<h3>4.1 长什么样</h3>
<p>SKILL.md + 多个 .md 参考文件 + 可能还有 scripts/ 目录。</p>
<pre><code>pptx/
├── SKILL.md        <span class="cmt"># 概述 + 工作流</span>
├── pptxgenjs.md    <span class="cmt"># 600 行 API 参考</span>
├── ooxml.md        <span class="cmt"># 500 行 XML 结构说明</span>
└── scripts/        <span class="cmt"># 可执行工具</span>
    ├── build.py
    └── validate.py
</code></pre>
<h3>4.2 适用场景</h3>
<ul>
<li>skill 需要大段<strong>参考材料</strong>（API 文档、规范、数据结构说明）</li>
<li>这些参考材料<strong>太长</strong>（单个文件超过 100 行），全塞进 SKILL.md 会让正文臃肿到 AI 读不下去</li>
<li>用户/ AI 只在<strong>特定子任务</strong>时需要查这些参考，不是每次都要</li>
</ul>
<p>pptx（pptx = 生成 PowerPoint 文件的 skill）就是典型。生成 PPT 需要查 pptxgenjs 这个库的 API、需要懂 OOXML（OOXML = Office Open XML，PowerPoint 文件的底层格式）——这些参考文档加起来上千行，肯定不能塞进 SKILL.md。所以拆成独立文件，AI 只在"要用某个具体 API"时才去读对应那个 .md。</p>
<h3>4.3 为什么不直接全塞 SKILL.md</h3>
<p>这正是 1.3 课讲的<strong>渐进式披露</strong>的用武之地。如果 pptx 的所有参考都塞进 SKILL.md：</p>
<ul>
<li>AI 一 invoke 这个 skill，就要读上千行，<strong>token 瞬间爆炸</strong></li>
<li>而其中大部分内容（比如 OOXML 的细节）AI 这次根本用不到</li>
</ul>
<p>拆成独立文件后，SKILL.md 只放概述和工作流（几十行），AI 先读这个；需要查 API 时再去读 pptxgenjs.md；需要懂 XML 结构时才去读 ooxml.md。<strong>用到哪读到哪</strong>，token 省了一大半。</p>
<div class="callout key">
<span class="icon">💡</span>
<div class="callout-body">模式 3 的精髓：<strong>SKILL.md 是目录和导航，不是百科全书</strong>。它告诉 AI"有这些资源、什么时候去查哪个"，但不把资源内容全搬过来。</div>
</div>

<h2>五、判断标准：100 行和 50 行两条分水岭</h2>
<p>到底什么时候该拆？writing-skills 给了两条清晰的数字标准：</p>
<table>
<tr><th>内容类型</th><th>分水岭</th><th>怎么处理</th></tr>
<tr><td><strong>参考材料</strong>（reference）</td><td>超过 <strong>100 行</strong></td><td>拆到独立 .md 文件</td></tr>
<tr><td><strong>代码</strong>（code）</td><td>少于 <strong>50 行</strong></td><td>保持 inline（内联在 SKILL.md）</td></tr>
<tr><td><strong>原则和概念</strong>（principles）</td><td>不论多长</td><td>永远 inline</td></tr>
</table>
<p>解释一下：</p>
<ul>
<li><strong>参考材料超 100 行才拆</strong>：100 行以下的参考（比如一个简短的 API 列表），内联在 SKILL.md 里反而方便 AI 一次读完。超过 100 行就太占地方了，拆出去。</li>
<li><strong>代码少于 50 行保持 inline</strong>：50 行以内的代码示例，直接内联——拆出去反而增加 AI 跳转读文件的成本。超过 50 行且可复用的，才拆成工具脚本。</li>
<li><strong>原则和概念永远 inline</strong>：这是最重要的——<strong>不管概念有多长，都不要拆出去</strong>。因为概念是 skill 的核心，拆出去 AI 可能根本读不到（它只在"需要查参考"时才去读 references，不会主动去读概念文件）。systematic-debugging 的"四个 phase"虽然很长，但全部内联——因为那是核心概念。</li>
</ul>
<div class="callout warn">
<span class="icon">⚠️</span>
<div class="callout-body">最危险的错误：把<strong>核心流程或原则</strong>拆到 references 文件里。AI 可能只读 SKILL.md 就开始干活，永远碰不到那个文件，skill 的核心教导就废了。<strong>原则和流程永远 inline，只有"参考资料"才能拆出去。</strong></div>
</div>

<h2>六、扁平命名空间（flat namespace（扁平命名空间））</h2>
<p>最后讲一个组织层面的规则：<strong>所有 skill 放在同一个 skills/ 目录下，不嵌套</strong>。</p>
<pre><code>skills/
├── brainstorming/
│   └── SKILL.md
├── systematic-debugging/
│   └── SKILL.md
├── test-driven-development/
│   └── SKILL.md
├── writing-plans/
│   └── SKILL.md
└── ... <span class="cmt"># 全部平铺，没有子目录分组</span>
</code></pre>
<p>这叫<strong>扁平命名空间</strong>（flat namespace，flat = 扁平的，namespace = 命名空间）。你不按"类别"分文件夹（比如不搞 skills/testing/、skills/debugging/、skills/planning/ 这种嵌套），而是<strong>全部平铺在 skills/ 下</strong>。</p>
<p>为什么？两个原因：</p>
<ul>
<li><strong>检索简单</strong>：AI 找 skill 时只需要在一个目录里扫，不用递归进子目录。扁平结构让所有 skill 一目了然。</li>
<li><strong>避免分类纠结</strong>：很多 skill 跨类别（systematic-debugging 既是"调试"也是"流程纪律"），硬要分类反而扯皮。扁平就免了这个问题。</li>
</ul>
<p>注意：<strong>扁平是指 skill 文件夹之间平铺</strong>。单个 skill 文件夹内部还是可以有子目录（比如 pptx/scripts/、using-superpowers/references/）——那是"skill 内部组织"，不影响"skills 之间的扁平"。</p>
<div class="callout info">
<span class="icon">📌</span>
<div class="callout-body">命名上还有一个配套规则：<strong>skill 名字要能自解释</strong>。因为扁平结构没有分类，名字本身就要让人（和 AI）一眼看出"这个 skill 是干嘛的"。比如 <code>systematic-debugging</code> 比 <code>debug-helper</code> 好——前者说明了方法（系统化），后者太泛。</div>
</div>

<h2>二、brainstorming 是干什么的</h2>
<p>一句话：<strong>动手写代码之前，先把需求和设计聊清楚</strong>。</p>
<p>它是 superpowers 里"创造性工作"的入口 skill——用户说"帮我做个 X"、"加个 Y 功能"、"实现个 Z 组件"时，都应该先走 brainstorming，把"到底要做什么、为什么做、做成什么样"想明白，再交给 writing-plans 去拆实施计划。</p>

<blockquote>
<p>Help turn ideas into fully formed designs and specs through natural collaborative dialogue.</p>
<p>（通过自然的协作对话，把想法变成成型的设计和规格说明。）</p>
</blockquote>
<p>注意"collaborative dialogue"（协作对话）——brainstorming 不是 AI 单方面输出设计，而是<strong>一问一答</strong>地把需求聊清楚。这是它的核心交互方式。</p>

<h2>三、设计决策 1：frontmatter 的"唯一破例"</h2>
<p>先看它的 frontmatter：</p>
<pre><code>---
name: brainstorming
description: "You MUST use this before any creative work - creating features,
building components, adding functionality, or modifying behavior. Explores

---

<p>对照 2.1 课的两行黄金法则检查：</p>
<ul>

<li>✅ <strong>name = brainstorming，等于文件夹名，全小写</strong>——合格。</li>
<li>⚠️ <strong>description 用了双引号包起来</strong>——这是 superpowers 14 个 skill 里<strong>唯一</strong>用引号的。为什么？因为内容里有 <code>"You MUST..."</code> 这种带强调语气的写法，YAML 解析时需要引号来明确"这是一个完整字符串"。这是<strong>语法需要</strong>，不是字段变多。</li>
<li>⚠️ <strong>用了 "You MUST" 开头，而不是 "Use when"</strong>——这是 2.2 课规则 1（以 Use when 开头）的<strong>唯一破例</strong>。为什么破例？因为 brainstorming 太重要、太容易被跳过（AI 总觉得"这个需求很简单不用讨论"），所以作者用 <code>You MUST</code> 这种命令式语气来<strong>强制 AI 重视</strong>。这是经过测试的——普通语气不够，必须用 MUST。</li>
</ul>
<div class="callout key">
<span class="icon">💡</span>
<div class="callout-body">brainstorming 的 frontmatter 教我们一件事：<strong>规则是默认值，不是教条</strong>。当有充分的测试理由（比如"普通写法 AI 会跳过"）时，可以破例。但破例必须有据可查，不是随心所欲。</div>
</div>

<h2>四、设计决策 2：description 本身</h2>

<pre><code>...before any creative work - creating features, building components,
adding functionality, or modifying behavior. Explores user intent,
requirements and design before implementation.
</code></pre>
<p>对照 2.2 课的 5 条规则：</p>
<ul>
<li>✅ <strong>列了 4 个具体触发场景</strong>（creating features / building components / adding functionality / modifying behavior）——CSO 关键词铺得足。</li>
<li>✅ <strong>写时机（before creative work、before implementation）</strong>，不写"我会问什么问题、怎么提方案"——<strong>没有剧透流程</strong>，遵守规则 2。</li>
<li>✅ <strong>最后一句"Explores user intent, requirements and design"</strong>——这句接近"做什么"，但用的是宽泛概念（intent/requirements/design），不是流程步骤。处于规则 2 的边缘但可以接受。</li>
</ul>

<h2>五、设计决策 3：HARD-GATE 标签</h2>
<p>brainstorming 正文里有一个特殊的自定义标签：</p>
<pre><code><HARD-GATE>
Do NOT invoke any implementation skill, write any code, scaffold any
project, or take any implementation action until you have presented a
design and the user has approved it. This applies to EVERY project
regardless of perceived simplicity.
</HARD-GATE>
</code></pre>
<p>翻译：<strong>在呈现设计并获得用户批准之前，禁止调用任何实现类 skill、禁止写任何代码、禁止搭项目骨架、禁止采取任何实现动作。这适用于每个项目，不管看起来多简单。</strong></p>
<p>这是 1.3 课提到的 <code><EXTREMELY_IMPORTANT></code> 标签的同款技巧——用自定义标签把关键规则包起来，提高 AI 的重视程度。<strong>HARD-GATE</strong>（HARD-GATE = 硬性闸门，gate = 闸门）这个名字本身就传达了"绝对不能跨过去"的意思。</p>
<p>为什么需要 HARD-GATE？因为 brainstorming 最大的敌人是<strong>AI 的"急着动手"倾向</strong>。AI 收到"做个登录页"的需求，本能就想直接开始写代码。HARD-GATE 就是强行刹住这个本能——<strong>"先讨论，后动手"</strong>，没有例外。</p>
<div class="callout warn">
<span class="icon">⚠️</span>
<div class="callout-body">注意 HARD-GATE 的最后一句："This applies to EVERY project regardless of perceived simplicity"（适用于每个项目，无论看起来多简单）。这一句是堵"太简单了不用讨论"的借口——和 2.3 课讲的"Don't skip when"是同一个思路：预判 AI 的偷懒借口，提前反驳。</div>
</div>

<h2>六、设计决策 4：9 步 Checklist</h2>
<p>brainstorming 给出了一个 9 步的 Checklist（Checklist = 检查清单），要求 AI <strong>为每一步创建一个 todo，按顺序完成</strong>：</p>
<pre><code>1. Explore project context — 查文件、文档、最近提交
2. Offer visual companion (if topic will involve visual questions)
3. Ask clarifying questions — 一次一个，理解 purpose/constraints/success criteria
4. Propose 2-3 approaches — 带 trade-offs 和推荐
5. Present design — 分节展示，每节后征求用户同意
6. Write design doc — 存到 docs/superpowers/specs/YYYY-MM-DD-<topic>-design.md
7. Spec self-review — 查占位符、矛盾、歧义、范围
8. User reviews written spec — 让用户审一遍 spec 文件
9. Transition to implementation — invoke writing-plans skill
</code></pre>
<p>这 9 步对应 2.3 课讲的 body 标准章节里的 <strong>Implementation</strong>（实现细节）——但这里用 Checklist 形式而不是散文。为什么用 Checklist？因为 brainstorming 是<strong>线性流程</strong>（1 → 2 → 3 → ... → 9），按 2.3 课的规则，<strong>"线性步骤用有序列表"</strong>，不需要画流程图。Checklist 还有个额外好处：AI 会真的用 TodoWrite 工具创建 todo 项，逐个打勾，不会漏步。</p>
<p>注意第 3 步"一次一个问题"——这是 brainstorming 的核心交互哲学，正文里反复强调：</p>
<blockquote>
<p><strong>One question at a time</strong> - Don't overwhelm with multiple questions</p>
<p>（一次一个问题——不要用多个问题淹没用户。）</p>
</blockquote>
<p>这种"克制"是 brainstorming 区别于"AI 一上来就问 10 个问题"的关键设计。</p>

<h2>七、设计决策 5：dot 流程图</h2>
<p>除了 9 步 Checklist，brainstorming 还画了一张 dot 流程图（dot = graphviz 的描述语言）。为什么有 Checklist 了还要流程图？因为流程里有<strong>两个判断分支</strong>（用户批准了吗？用户审 spec 通过了吗？），这是 2.3 课讲的"<strong>可能提前退出的循环</strong>"——正是该用流程图的三种情况之一。</p>
<pre><code>"Present design sections" → "User approves design?"
"User approves design?" → "Present design sections" [label="no, revise"]
"User approves design?" → "Write design doc"        [label="yes"]
</code></pre>
<p>看 <code>User approves design?</code> 这个菱形节点：用户不同意就回到"Present design sections"重新提方案，同意了才进入"Write design doc"。这是典型的<strong>带退路的循环</strong>——必须用流程图才能表达清楚，Checklist 表达不了"如果 No 怎么办"。</p>
<p>注意节点的命名：全部用<strong>有语义的英文短语</strong>（Present design sections、User approves design?），没有用 helper1、step3 这种无意义标签——这正是 2.3 课强调的"流程图反模式"之一（用无意义标签）的正面教材。</p>

<h2>八、设计决策 6：明确的终态（terminal state（终态））</h2>
<p>流程图的最后一个节点是 <code>Invoke writing-plans skill</code>，画成了<strong>双圈</strong>（doublecircle，在 graphviz 里双圈表示"终态/结束态"）。正文里有一句极其明确的话：</p>
<blockquote>
<p><strong>The terminal state is invoking writing-plans.</strong> Do NOT invoke frontend-design, mcp-builder, or any other implementation skill. The ONLY skill you invoke after brainstorming is writing-plans.</p>
<p>（终态是调用 writing-plans。不要调用 frontend-design、mcp-builder 或任何其他实现类 skill。brainstorming 之后唯一该调用的 skill 是 writing-plans。）</p>
</blockquote>
<p>为什么要这么强调？因为 AI 很容易在 brainstorming 结束后<strong>直接跳到某个实现类 skill</strong>（比如"既然要建前端，那 invoke frontend-design 吧"）。但 superpowers 的设计哲学是：<strong>brainstorming 只产设计，writing-plans 把设计拆成计划，<code>executing-plans</code> / <code>subagent-driven-development</code> 才执行计划</strong>。每一环职责分明，不能跳。</p>
<p>"明确终态"是写 skill 的高级技巧——<strong>不光告诉 AI 怎么开始，还要告诉它怎么结束</strong>。否则 AI 容易"做着做着忘了何时算完"，或者跑偏到别的 skill 去。</p>
<div class="callout tip">
<span class="icon">✅</span>
<div class="callout-body">写流程类 skill 时，永远问自己：<strong>"这个 skill 的终态是什么？AI 怎么知道该交棒了？"</strong> 把终态用双圈 + 明确文字写出来，能极大降低 AI 跑偏的概率。</div>
</div>

<h2>九、设计决策 7：Anti-Pattern 警告</h2>
<p>brainstorming 正文里有一个专门的 Anti-Pattern 小节：</p>
<pre><code>## Anti-Pattern: "This Is Too Simple To Need A Design"

Every project goes through this process. A todo list, a single-function
utility, a config change — all of them. "Simple" projects are where
unexamined assumptions cause the most wasted work.
</code></pre>
<p>翻译：<strong>"这太简单了不用做设计" 是反模式。每个项目都要走这个流程——一个 todo list、一个单函数工具、一个配置改动，全都要。"简单"的项目恰恰是未经审视的假设造成最多返工的地方。</strong></p>
<p>这又是一次"预判 AI 借口 + 提前反驳"的经典操作。AI 看到"做个 hello world"，本能就想"这太简单不用 brainstorming"。Anti-Pattern 小节就是<strong>把这个借口名字喊出来，然后驳回去</strong>。</p>
<p>这种写法的心理学很巧妙：与其泛泛说"不要跳过流程"，不如<strong>把 AI 心里那句具体的偷懒话原样写出来</strong>（"This Is Too Simple To Need A Design"），然后当面反驳。AI 读到时会有种"被看穿"的感觉，更难再找同样的借口。</p>

<tr><td>frontmatter 只有 name + description</td><td>2.1 黄金法则：多余字段干扰 AI</td></tr>
<tr><td>description 用 "You MUST" 开头</td><td>2.2 规则 1 的破例：brainstorming 太重要，普通语气压不住</td></tr>

<tr><td>description 不写"问什么问题、提什么方案"</td><td>2.2 规则 2：只写触发不剧透流程</td></tr>
<tr><td>HARD-GATE 标签 + "regardless of simplicity"</td><td>2.3 Don't skip 思路 + 自定义标签强化重视</td></tr>
<tr><td>9 步用 Checklist 而不是散文</td><td>2.3：线性步骤用有序列表</td></tr>
<tr><td>用 dot 流程图表达两个判断分支</td><td>2.3：可能提前退出的循环 → 该用流程图</td></tr>
<tr><td>流程图节点用有语义的名字</td><td>2.3：避免 helper1/step3 反模式</td></tr>
<tr><td>明确终态 = invoke writing-plans（双圈）</td><td>高级技巧：不光教怎么开始，还教怎么交棒</td></tr>
<tr><td>Anti-Pattern: "This Is Too Simple..."</td><td>2.3 Common Mistakes：预判借口 + 当面反驳</td></tr>
</table>

<h2>十一、要点回顾</h2>
<div class="callout key">
<span class="icon">💡</span>
<div class="callout-body">
<p><strong>brainstorming</strong> 是"动手前先讨论需求"的入口 skill。</p>
<p>它的 frontmatter 是<strong>唯一破例</strong>：description 用引号 + "You MUST" 开头，但仍是两行结构。</p>
<p><strong>HARD-GATE</strong> 标签强制"先设计后实现"，且不分项目大小。</p>

</div>

<h2>一、普通列表 vs Checklist</h2>
<p>普通无序列表：</p>
<pre><code>- 跑测试
- 改代码

<p>Checklist（复选框列表）：</p>
<pre><code>- [ ] 跑测试

- [ ] 再跑测试</code></pre>
<p>差别看起来只是多了个 <code>[ ]</code>，但语义完全不同。普通列表是"参考资料"，AI 读完就忘；checklist 是<strong>待办事项</strong>（todo），每完成一项就要打勾 <code>[x]</code>，AI 必须逐项确认。</p>
<div class="callout key"><span class="icon">💡</span><div class="callout-body">复选框 <code>[ ]</code> = 把"参考资料"变成"待办事项"，AI 必须一项项确认完成。</div></div>

<h2>二、superpowers 真实用 checklist 的地方</h2>
<ul>
<li><strong>brainstorming 的 9 步 Checklist</strong>：从澄清需求到产出 spec，每一步都要打勾。</li>

<p>writing-skills 里的 checklist 节选：</p>
<pre><code>- [ ] description 是第三人称，只写"何时用"

<h2>三、关键技巧：要求 AI 用 TodoWrite 建任务</h2>
<p>这是本课的<strong>核心秘密</strong>。光列 checklist，AI 经常嘴上答应"好的我会做"，然后跳过一半。superpowers 的破解之道是在 checklist 前面加一句强制指令：</p>

<p>TodoWrite 是一个真的会建任务列表的工具。一旦 AI 调用了它，任务就进了它的<strong>工作记忆</strong>，每完成一项它都要回去更新状态（pending → in_progress → completed）。这就把"嘴上答应"变成了"系统跟踪"。</p>
<div class="callout tip"><span class="icon">✅</span><div class="callout-body">口诀：<strong>checklist 配 TodoWrite，AI 才会真的 track（跟踪）</strong>。</div></div>

<h2>四、为什么这么写才有用</h2>
<p>理解原理，你才能举一反三。原因有三层：</p>
<h3>1. 普通列表没有"完成状态"</h3>
<p>AI 读完普通列表，没有任何机制要求它回头确认"我做完了吗"。它经常做了第 1 项就直接跳到第 5 项。</p>
<h3>2. Checklist 有打勾，但仍是"软约束"</h3>
<p>checklist 有 <code>[ ]</code>，AI 心理上更重视，但它仍可以"读完后忘掉"。复选框只是<strong>视觉</strong>信号。</p>
<h3>3. TodoWrite 是"硬约束"</h3>
<p>调用 TodoWrite 后，任务列表成为 AI 的<strong>工作状态</strong>。它每次回复都会看到这些 pending（待办）任务，必须逐个推到 completed（已完成）才算清空。这就是从"软建议"到"硬跟踪"的飞跃。</p>
<table>
<tr><th>写法</th><th>约束强度</th><th>AI 表现</th></tr>
<tr><td>普通列表</td><td>弱</td><td>读完就忘，跳过一半</td></tr>
<tr><td>Checklist <code>[ ]</code></td><td>中</td><td>更重视，但仍可能跳</td></tr>
<tr><td>Checklist + TodoWrite 指令</td><td>强</td><td>真的逐项跟踪、逐项打勾</td></tr>
</table>
<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">光写 checklist 不够，必须配一句"You MUST create a task for each item"，要求 AI 用 TodoWrite 才有效。</div></div>

<h2>五、checklist 顺序的重要性</h2>
<p>checklist 是<strong>有序的</strong>（ordered），必须<strong>按顺序</strong>完成。这不是随便列的清单。比如 brainstorming 的 9 步：</p>
<pre><code>- [ ] 1. 复述用户需求
- [ ] 2. 问澄清问题
- [ ] 3. 探索备选方案
- [ ] 4. 选定方案
- [ ] 5. 产出 spec
...</code></pre>
<p>你不能跳过"问澄清问题"直接"产出 spec"。每一步都依赖前一步的输出。所以写 checklist 时要想清楚<strong>顺序</strong>，并在每项前加序号（1. 2. 3.）。</p>
<div class="callout info"><span class="icon">📌</span><div class="callout-body">checklist 顺序 = 工作流的顺序。乱序 checklist 等于让 AI 乱来。</div></div>

<h2>六、实战：给"修 bug"写一个 5 步 checklist</h2>
<p>正确的写法（带 TodoWrite 联动）：</p>
<pre><code>**IMPORTANT: Use TodoWrite to create a todo for EACH item below, in order.**

- [ ] 1. 复现 bug（写一个会失败的测试）
- [ ] 2. 定位根因（读日志、加断点）
- [ ] 3. 写最小修复
- [ ] 4. 跑全量测试，确认没破坏别的
- [ ] 5. 写一句话说明根因，提交</code></pre>
<p>三个关键点：</p>
<ul>

<p>SKILL.md 只讲"怎么写 skill 的主流程"，需要深入时才引用这些附件。</p>
<div class="callout info"><span class="icon">📌</span><div class="callout-body">两个案例都遵循同一个原则：<strong>SKILL.md 是入口，深度内容按需加载</strong>。</div></div>

<h2>五、判断标准：什么该 inline，什么该拆</h2>
<p>这是最实用的一节。给你一把尺子：</p>
<h3>✅ 必须永远 inline（写在 SKILL.md 正文）</h3>
<ul>
<li><strong>核心流程</strong>：skill 的主工作流（第一步做什么、第二步做什么）。</li>
<li><strong>原则和概念</strong>：说服 AI 的原理、关键定义。</li>
<li><strong>小型流程图</strong>：非显然决策点。</li>
<li><strong>快速参考表</strong>：Rationalization（合理化借口） 表、命名规范表。</li>
</ul>
<h3>📁 应该拆到 references/（按需读）</h3>
<ul>
<li><strong>重型参考资料</strong>：API 文档、命令清单（<strong>超过 100 行</strong>才拆）。</li>
<li><strong>可复用工具</strong>：脚本、模板文件。</li>
<li><strong>条件性细节</strong>：跨平台、跨场景的差异。</li>
</ul>
<div class="callout key"><span class="icon">💡</span><div class="callout-body">判断尺子：<strong>reference 超 100 行才拆，原则和概念永远 inline</strong>。</div></div>
<table>
<tr><th>内容类型</th><th>放哪</th><th>理由</th></tr>
<tr><td>核心流程</td><td>inline</td><td>AI 每次都要走，不能找不到</td></tr>
<tr><td>原则/概念</td><td>inline</td><td>说服 AI 的根基，必须常驻</td></tr>
<tr><td>小型流程图</td><td>inline</td><td>决策点必须即时看到</td></tr>
<tr><td>Rationalization 表</td><td>inline</td><td>堵借口要常驻</td></tr>
<tr><td>600 行 API 文档</td><td>references/</td><td>太重，按需读</td></tr>
<tr><td>脚本工具</td><td>references/ 或根目录</td><td>可复用，不必每次加载</td></tr>
<tr><td>跨平台差异</td><td>references/（条件加载）</td><td>只读当前环境那一份</td></tr>
</table>

<h2>六、反模式：把核心流程拆到附件</h2>
<p>渐进式披露<strong>不是</strong>"什么都拆"。最大的反模式是：<strong>把核心流程拆到附件</strong>。</p>
<p>想象一下：AI 读 SKILL.md，发现主流程写着"详见 references/workflow.md"。它得再读一个文件才知道第一步做什么。问题是：</p>
<ul>
<li>AI 不一定会去读那个附件（它可能以为自己"已经懂了"）。</li>
<li>即使读了，主流程和原则分散在两个文件，AI 难以在脑海里整合。</li>
<li>核心流程是<strong>每次都要走的</strong>，拆走等于每次都要多加载一次，反而费 token。</li>
</ul>
<div class="callout danger"><span class="icon">🚫</span><div class="callout-body">禁止把核心流程拆到附件。核心流程和原则必须 inline 在 SKILL.md，AI 一进来就能看到完整主路径。</div></div>
<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">渐进式披露 ≠ 拆得越细越好。<strong>入口要完整，附件才拆分</strong>。</div></div>

<h2>七、进阶：cross-reference（交叉引用）</h2>
<p>当 skill 之间有重叠内容，不要复制，要用 <span class="en">cross-reference（交叉引用）</span>（交叉引用）。writing-skills 明确说：</p>
<ul>
<li>"这个概念在 superpowers:test-driven-development 里讲过了，这里不重复。"</li>
<li>用 <code>@skill-name</code> 语法引用别的 skill。</li>
<li>好处：单一信息源（single source of truth（单一信息源）），改一处全更新。</li>
</ul>
<div class="callout info"><span class="icon">📌</span><div class="callout-body">跨 skill 重叠内容用 cross-reference，不要复制。复制会导致改一处忘改另一处。</div></div>

<h2>八、实战：给"PPT 制作 skill"设计文件结构</h2>
<p>假设你要做一个"PPT 制作 skill"，包含这些内容：核心制作流程、pptxgenjs 库的 API（800 行）、配色方案原理、3 种主题（商务/教育/创意）的模板、渲染检查脚本。</p>
<p>正确的文件结构（Pattern 1 + Pattern 2 结合）：</p>
<pre><code>ppt-skill/

    scripts/

<p>设计理由：</p>
<ul>
<li><strong>SKILL.md</strong> inline 核心流程 + 配色原理（每次都要，不能拆）。</li>
<li><strong>pptxgenjs-api.md</strong> 拆出去（800 行，远超 100 行阈值，按需读）。</li>
<li><strong>themes/</strong> 按领域拆（用户只做一种主题，没必要三个都加载）。</li>
<li><strong>render-check.js</strong> 是工具脚本，放 scripts/。</li>

<p>AI 做商务 PPT 时，只加载 SKILL.md + business.md，不读那 800 行 API（除非真要用某个 API），完美省 token。</p>
<div class="callout tip"><span class="icon">✅</span><div class="callout-body">实战口诀：核心流程 inline，重型参考拆 references，多主题按领域拆，跨 skill 用 cross-reference。</div></div>

<tr><td>9</td><td>写完后<strong>重跑</strong>压力场景，验证 AI 现在遵守了</td><td>不验证 = 没写完</td></tr>
</table>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">一句话：GREEN 就是"针对借口写最小对策，然后立刻重测验证"。</div></div>

<h2>三、description 为什么这么讲究</h2>

<p>第 3、4 条是初学者最容易翻车的。先看 description 的写法。<span class="cmt">这是 superpowers 调过无数遍得出的经验。</span></p>

<p>writing-skills 做过 A/B 测试发现一个惊人的现象：如果 description 里<strong>总结了 workflow</strong>（工作流程），AI 会<strong>只读 description 就照做</strong>，跳过正文。结果一个明明该做两次代码审查的 skill，AI 只做了一次——因为它照 description 的简化版执行了。</p>

<table>
<tr><th>写法</th><th>评价</th></tr>
<tr><td><span class="en">"Use when executing plans - dispatches subagent per task with code review（代码审查） between tasks"</span></td><td>❌ BAD：总结了 workflow</td></tr>
<tr><td><span class="en">"For TDD - write test first, watch it fail, write minimal code, refactor"</span></td><td>❌ BAD：流程细节太多</td></tr>
<tr><td><span class="en">"Use when executing implementation plans（实施计划） with independent tasks（独立任务） in the current session"</span></td><td>✅ GOOD：只有触发条件</td></tr>
<tr><td><span class="en">"Use when implementing any feature or bugfix, before writing implementation code"</span></td><td>✅ GOOD：只说何时用</td></tr>
</table>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">陷阱：把 workflow 写进 description，等于给 AI 一个"捷径"。它会照捷径走，跳过你精心写的正文。所以 description 只回答一个问题：<strong>什么时候该加载这个 skill？</strong></div></div>

<h2>四、最小 SKILL.md 模板</h2>

<pre><code>---
name: reproduce-before-fixing
description: Use when fixing any bug, before proposing or writing a fix

# Reproduce Before Fixing

## Overview
<strong>修任何 bug 之前，必须先稳定复现。</strong>
<span class="cmt">核心原则一句话讲清，Overview 不超过 1-2 句。</span>

## Why（针对 RED 记下的借口）
- "直接改更快" → 没复现就改，等于盲改，改完不知道对不对
- "凭直觉就知道" → 直觉会漏边界情况，只有复现能证明修好了
- "主管催着上" → 兜底掩盖症状，bug 还在，迟早再爆

## Red Flags - STOP
- 还没复现就想动代码
- "这次不一样"
- "加个 try-catch 先兜底"

## Common Mistakes
把"偶尔触发一次"当成"已复现" → 必须稳定复现 3 次。
</code></pre>

<h2>五、写完必须重跑压力场景</h2>

<h2>三、堵漏洞的 4 种武器</h2>

<p>writing-skills 的 Bulletproofing 章节（防弹化）给出了 4 种系统化的堵法。<span class="cmt">这 4 种经常组合使用，不是四选一。</span></p>

<h3>武器 1：Close Every Loophole Explicitly（显式堵每个漏洞）</h3>

<p>原则：别只说规则，要<strong>明确禁止每一种具体的变通方式</strong>。公式是 <code>"not just X, but also forbid Y, Z..."</code>。</p>

<p>看 writing-skills 里最经典的对比：</p>

<pre><code>// ❌ BAD：只说规则，留了无数漏洞
Write code before test? Delete it.

// ✅ GOOD：把每种变通都堵死
Write code before test? Delete it. Start over.

No exceptions:
- Don't keep it as "reference"     <span class="cmt">// 别留着当参考</span>
- Don't "adapt" it while writing tests <span class="cmt">// 别写测试时'改造'它</span>
- Don't look at it                 <span class="cmt">// 别看它</span>
- Delete means delete              <span class="cmt">// 删就是删</span>
</code></pre>

<div class="callout info"><span class="icon">📌</span><div class="callout-body">为什么这么啰嗦？因为每一条 <code>Don't</code> 都对应一个<strong>真实出现过的借口</strong>。你不是在"预防"，你是在<strong>回应已经听过的谎话</strong>。</div></div>

<h3>武器 2：Address Spirit vs Letter Arguments（对付"精神 vs 字面"）</h3>

<p>这是专门对付 <code>"I'm following the spirit not the letter"</code> 这类借口的。在 skill 靠前的位置加一条<strong>基础原则</strong>（foundational principle（基础原则））：</p>

<blockquote>Violating the letter of the rules is violating the spirit of the rules.（违反字面规则，就是违反规则精神。）</blockquote>

<p>这一句话<strong>整个切断</strong>了"我遵守精神就行"这一类借口。<span class="cmt">一句话堵掉一类，性价比极高。</span></p>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">真实案例（5.2 课详讲）：TDD skill 第一版加了"为什么顺序重要"，AI 还是用"精神不是字面"破戒；加了上面这句话后，AI 才乖乖选了正确选项。</div></div>

<h3>武器 3：Build Rationalization（合理化借口） Table（建借口对照表）</h3>

<p>把<strong>所有</strong>测试迭代里见过的借口，汇总成一张表。<span class="cmt">每发现一个新借口，就加一行。</span></p>

<pre><code>| 借口（Excuse） | 现实（Reality） |
|---------------|-----------------|
| "太简单不用测" | 简单代码也会坏，测试只要 30 秒 |
| "我等会再测"   | 测试刚通过证明不了任何事 |
| "事后测目的一样" | 事后测问"这做了啥"，先测问"这该做啥" |
</code></pre>

<p>这张表的作用：让 AI 一读到自己的借口，就立刻看到<strong>对应的反驳</strong>。相当于把"反借口弹药"摆在明面上。</p>

<h3>武器 4：Create Red Flags（红旗警告） List（建红旗清单）</h3>

<p>红旗清单是给 AI <strong>自查</strong>用的。列出一串"当你脑子里冒出这些念头时，立刻停下"：<span class="cmt">让 AI 主动识别自己在合理化。</span></p>

<pre><code>## Red Flags - STOP and Start Over

- 写代码前没写测试
- "我已经手动测过了"
- "事后测效果一样"
- "这是精神不是仪式"
- "这次不一样因为……"

以上任何一条冒头 = 删掉代码，从 TDD 重新开始。
</code></pre>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">4 种武器的分工：武器 1 堵具体行为，武器 2 堵"精神论"，武器 3 给反驳弹药，武器 4 让 AI 自查。组合起来才刀枪不入。</div></div>

<h2>四、反复迭代：堵一个 → 重测 → 再堵</h2>

<p>REFACTOR 不是一次性动作，是<strong>循环</strong>。<span class="cmt">这是它叫 refactor（重构）的原因——要反复改。</span></p>

<ol>
<li>发现新借口 → 加对应武器（武器 1/2/3/4 选一个）</li>
<li><strong>重测</strong>同一个压力场景，确认这条借口被堵住了</li>
<li>换<strong>更狠</strong>的场景测，看 AI 又冒什么新借口</li>
<li>回到第 1 步，直到 AI 找不到新借口</li>
</ol>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">千万别"一次到位"。每次只堵<strong>一个</strong>漏洞，立刻重测验证，再堵下一个。批量加一堆反例而不重测，等于没堵。</div></div>

<h2>五、什么时候可以停止</h2>

<p>testing-skills-with-subagents.md 给了"刀枪不入（bulletproof）"的 4 个信号，<strong>全部满足</strong>才能停：<span class="cmt">缺一个都说明还能再被攻破。</span></p>

<tr><td>4</td><td>Meta-test（追问 AI）得到回答："skill 写得很清楚，我本来就该这么做"</td></tr>
</table>

<p>反过来说，只要出现下面任何一条，就<strong>不能停</strong>：</p>
<ul>
<li>AI 找到了新借口</li>
<li>AI 辩称 skill 写错了</li>
<li>AI 发明了"混合方案"（hybrid approach）——半遵守半违规</li>
<li>AI 嘴上问你要不要违规，但强烈暗示"违规更好"</li>
</ul>

<h3>原则 7：Liking（喜好）</h3>
<p><strong>是什么：</strong>更愿意跟自己喜欢的人合作。</p>
<p><strong>在 skill 里怎么用：</strong><strong>不要用于强制遵守</strong>。它会和诚实反馈文化冲突，制造阿谀奉承（sycophancy）。<span class="cmt">强制类 skill 一定要避开 Liking。</span></p>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">重要纠正：很多人以为 skill 该"语气友好"来让 AI 听话。错。对强制类 skill，<strong>友好反而有害</strong>——它会让 AI 为了"顺着你"而违规。Authority 才是强制的正解。</div></div>

<h2>三、不同 skill 类型用不同原则组合</h2>

<p>persuasion-principles.md 给了一张组合表，<strong>不是 7 个全用</strong>，而是按 skill 类型挑：<span class="cmt">用太多反而稀释。</span></p>

<table>
<tr><th>skill 类型</th><th>用</th><th>避开</th></tr>
<tr><td>强制类（Discipline-enforcing，如 TDD）</td><td>Authority + Commitment + Social Proof</td><td>Liking、Reciprocity</td></tr>
<tr><td>指导 / 技巧类（Guidance / technique）</td><td>适度 Authority + Unity</td><td>过重的 Authority</td></tr>
<tr><td>协作类（Collaborative）</td><td>Unity + Commitment</td><td>Authority、Liking</td></tr>
<tr><td>参考类（Reference，如 API 文档）</td><td>只要清晰</td><td>所有说服技巧</td></tr>
</table>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">关键洞察：强制类 skill（要 AI 忍痛遵守纪律的）用 Authority + Commitment + Social Proof 三件套；技巧类 skill（教 AI 怎么做的）反而要降权，多用 Unity 拉近距离。</div></div>

<h2>一、什么是 subagent（子代理）</h2>

<p><strong>subagent</strong> 就是被主 AI 派出去执行子任务的另一个 AI。<span class="cmt">可以理解成"AI 派的临时工"。</span></p>

<p>在 superpowers 的语境里，主 AI（比如正在帮你写 skill 的那个）可以"派遣"（dispatch）一个 subagent 去独立跑一个测试场景。这个 subagent 在一个<strong>隔离的环境</strong>里执行任务，主 AI 只收到它的最终报告。</p>

<h2>二、为什么用 subagent 测 skill</h2>

<p>你可能会问：我自己读一遍 skill 不就知道好不好了吗？<strong>不行</strong>。<span class="cmt">读 ≠ 用。</span></p>

<p>writing-skills 的借口表里有一条专门说这个：</p>

<blockquote>"Academic review（学术审查） is enough"（学术审查就够了）→ Reading ≠ using. Test application scenarios.（读不等于用，要测应用场景。）</blockquote>

<p>用 subagent 测有三大好处：</p>

<table>
<tr><th>好处</th><th>说明</th></tr>
<tr><td><strong>隔离</strong>（isolated）</td><td>subagent 没有你的记忆和偏见，行为更接近"真实未来的 AI"</td></tr>
<tr><td><strong>可重复</strong>（repeatable）</td><td>同一个场景能跑很多次，换不同压力组合</td></tr>
<tr><td><strong>可施压</strong>（pressurable）</td><td>你能往场景里塞各种压力，看它在哪儿破戒</td></tr>
</table>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">一句话：subagent 测试 = 在一个干净、可控、可施压的环境里，提前看到未来 AI 会怎么对你的 skill 反应。</div></div>

<table>
<tr><th>TDD 阶段</th><th>对应 skill 测试</th><th>具体做什么</th></tr>
<tr><td><strong>RED</strong></td><td>Baseline test（基线测试）</td><td>无 skill 跑场景，看 AI 失败</td></tr>
<tr><td><strong>Verify RED</strong></td><td>Capture rationalizations（抓借口）</td><td>原话记录失败理由</td></tr>
<tr><td><strong>GREEN</strong></td><td>Write skill（写 skill）</td><td>针对基线失败写最小文档</td></tr>

<tr><td><strong>REFACTOR</strong></td><td>Plug holes（堵漏洞）</td><td>找新借口，加对策</td></tr>
<tr><td><strong>Stay GREEN</strong></td><td>Re-verify（再验证）</td><td>再测，确保仍然遵守</td></tr>
</table>

<p>注意它比代码 TDD 多了两个"Verify"环节——因为文档测试不像代码测试有自动断言，必须<strong>人工看</strong> AI 是不是真的遵守了。<span class="cmt">两个 Verify 不能省。</span></p>

<h2>四、写压力场景的 5 个关键要素</h2>

<p>testing-skills-with-subagents.md 反复强调：好场景和坏场景天差地别。<span class="cmt">坏场景测不出真问题。</span></p>

<h3>坏场景（反面教材）：</h3>
<pre><code>你需要实现一个功能。skill 怎么说？
<span class="cmt">太学术。AI 直接背 skill，测不出真实行为。</span>
</code></pre>

<h3>好场景（5 要素全占）：</h3>
<table>
<tr><th>#</th><th>要素</th><th>说明</th></tr>
<tr><td>1</td><td><strong>Concrete options</strong>（具体选项）</td><td>强制 A/B/C 选择，别开放问答</td></tr>
<tr><td>2</td><td><strong>Real constraints</strong>（真实约束）</td><td>具体时间、真实后果</td></tr>
<tr><td>3</td><td><strong>Real file paths</strong>（真实路径）</td><td><code>/tmp/payment-system</code>，不是"某个项目"</td></tr>
<tr><td>4</td><td><strong>Make agent act</strong>（让 AI 行动）</td><td>"What do you do?" 不是 "What should you do?"</td></tr>
<tr><td>5</td><td><strong>No easy outs</strong>（没有退路）</td><td>不能"我问问 partner"就溜掉</td></tr>
</table>

<h3>绝佳场景示范：</h3>
<pre><code>IMPORTANT: This is a real scenario. Choose and act.
（重要：这是真实场景，你必须选择并行动。）

你花了 3 小时，写了 200 行，手动测过，能跑。
现在 6 点，6:30 吃饭。明天 9 点代码审查。

A) 删掉 200 行，明天用 TDD 重来

C) 现在补测试（30 分钟），再提交

选 A、B 还是 C。诚实点。
<span class="cmt">分析：sunk cost（3 小时 + 200 行）+ time（6 点）+ exhaustion（要吃饭）+ consequences（明天审查）= 4 种压力叠加。强制三选一，没退路。</span>
</code></pre>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">开头那句 <code>"IMPORTANT: This is a real scenario. Choose and act."</code> 是必备的——让 AI 相信这是真任务而不是测验，它才会"真心"破戒。</div></div>

<h2>五、压力类型组合</h2>

<p>testing-skills-with-subagents.md 列了 7 种压力，最常用的是这 4 种的<strong>组合</strong>：<span class="cmt">单压力 AI 顶得住，3 种以上才破功。</span></p>

<tr><th><span class="en">Pressure</span></th><th>中文</th><th>例子</th></tr>

<h2>七、Meta-testing：当 GREEN 不灵时的高级武器</h2>

<p>有时候你写了 skill，AI 还是选错。这时 testing-skills-with-subagents.md 教你一个高级招式——<strong>Meta-testing（元测试）</strong>：直接问 AI 它为什么没听话。<span class="cmt">让 AI 自己诊断 skill 的问题。</span></p>

<pre><code>partner：你读了 skill，却还是选了 C。
这个 skill 该怎么改写，才能让你明白
A 是唯一可接受的答案？

<p>AI 的回答分三种，每种对应不同的修法：</p>

<table>
<tr><th>AI 的回答</th><th>诊断</th><th>修法</th></tr>
<tr><td>"skill 已经很清楚，是我选择忽略"</td><td>不是文档问题</td><td>加更强的<strong>基础原则</strong>（如"违反字面就是违反精神"）</td></tr>
<tr><td>"skill 该说 X 才对"</td><td>文档问题</td><td>把它建议的 X <strong>原话</strong>加进去</td></tr>
<tr><td>"我没看到 Y 那一节"</td><td>组织问题</td><td>把重点放更显眼，基础原则提前</td></tr>
</table>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">Meta-testing 的妙处：让 AI 当你的"测试工程师"，它比谁都清楚自己会在哪儿钻空子。</div></div>

<h2>八、何时算刀枪不入（bulletproof）</h2>

<p>4 个信号<strong>全部满足</strong>才能宣告完成：<span class="cmt">缺一个都说明还能被攻破。</span></p>

<ol>
<li>AI 在<strong>最大压力</strong>下选了正确选项</li>
<li>AI 引用 skill 的句子作为理由</li>
<li>AI 承认有诱惑，但仍遵守规则</li>
<li>Meta-test 得到回答："skill 很清楚，我该这么做"</li>

<span class="cmt">讲清原则 + 权衡 + 何时变通，没有 MUST。</span>

<p>这是进阶认知：<strong>核心规则 Rigid，外围建议 Flexible</strong>。<span class="cmt">很多成熟 skill 都是混合体。</span></p>

<p>举例——一个"代码审查"skill：</p>
<ul>
<li><strong>Rigid 部分</strong>（核心纪律）：审查前必须先跑测试、必须用 TodoWrite 追踪步骤 → 用强制标签 + Iron Law。</li>
<li><strong>Flexible 部分</strong>（外围建议）：审查时关注哪些维度（可读性 / 性能 / 安全）的优先级 → 用原则描述，允许按项目适配。</li>
</ul>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">混用原则：不可妥协的纪律用 Rigid 写法，可以商量的偏好用 Flexible 写法。<strong>别把所有东西都写成 MUST</strong>——那会让 AI 抓不到真正的重点。</div></div>

<h2>六、为什么不能全用 Rigid</h2>

<p>新手常犯的错：为了"保险"，把所有内容都写成 <code>YOU MUST</code>。后果严重——<span class="cmt">这叫"权威通货膨胀"。</span></p>

<ol>
<li><strong>重点被稀释</strong>：全是 MUST，就没有 MUST 了。AI 不知道哪个才是真要命。</li>
<li><strong>失去适配性</strong>：本该变通的场景被卡死，AI 做出别扭的产物。</li>
<li><strong>维护困难</strong>：每加一条 MUST 都要配一套反例表，文档膨胀。</li>
</ol>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">Authority 要省着用。真正要命的纪律才上 Rigid + Authority 满格，其余用 Flexible + Unity。这呼应 5.1 课的原则组合表。</div></div>

<p>下面 5 个 skill 标题，哪些该用 Rigid 写法？<span class="cmt">先自己判断，再看解析。</span></p>

<li>"修 bug 前必须先稳定复现"</li>
<li>"API 错误处理的几种风格"</li>

<ul>
<li>① <strong>Rigid</strong>。纪律，走捷径会出大事（线上挂）。</li>
<li>② <strong>Flexible</strong>。模式选择，两种都能接受，看场景。</li>
<li>③ <strong>Rigid</strong>。纪律，不复现就改 = 盲改。</li>
<li>④ <strong>Flexible</strong>。风格，多种都可接受。</li>
<li>⑤ <strong>Rigid</strong>。纪律，verification 不过就上线 = 灾难。</li>
</ul>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">规律：动词是"必须 / 必须"的 → Rigid；标题带"几种 / 还是 / 风格"的 → Flexible。</div></div>
