<p>你装上 superpowers 之后，有没有发现一件奇怪的事：每次你打开一个新对话，AI 似乎"天生"就知道自己有 superpowers，会主动调用各种 skill。你没有输任何命令，也没有贴任何文档。它是怎么知道的？</p>

<p>这一节就要揭开这个秘密。答案只有两个词：<b>SessionStart hook</b>。</p>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">superpowers 自动生效的真相：它在每次会话启动（startup）时，自动跑一段脚本，把入口 skill 的全文"塞进"AI 的系统提示词（system prompt（系统提示词））里。</div></div>

<h2>二、什么是 hook（钩子）？</h2>
<p>hook（钩子）是一个通用编程概念：在某个事件发生时，自动触发执行的一段代码。在 zcode/Claude Code 体系里，hook 的"事件"可以是：</p>
<ul>
  <li><b>SessionStart</b>：会话开始（启动、清空、压缩时）</li>
  <li>工具调用前后（PreToolUse / PostToolUse）</li>
  <li>用户提交消息时</li>
  <li>等等</li>
</ul>
<p>superpowers 只用了一种：SessionStart。理由很清楚——它要在 AI 还没开口之前，就把"你有 superpowers"这个事实告诉它。</p>

<h2>三、看真实 hooks.json</h2>
<p>打开 superpowers 的 <code>hooks/hooks.json</code>，内容是这样的：</p>

<pre><code>{
  "hooks": {
    "SessionStart": [
      {
        "matcher": "startup|clear|compact",
        "hooks": [
          {
            "type": "command",
            "command": ""\${CLAUDE_PLUGIN_ROOT}/hooks/run-hook.cmd" session-start",
            "async": false
          }
        ]
      }
    ]
  }
}
</code></pre>

<p>逐字段拆解：</p>
<table>
  <tr><th>字段</th><th><span class="en">中文</span></th><th>含义</th></tr>
  <tr><td><code>"SessionStart"</code></td><td><span class="cmt">会话开始事件</span></td><td>声明这是在会话启动时触发的 hook。</td></tr>
  <tr><td><code>"matcher": "startup|clear|compact"</code></td><td><span class="cmt">匹配器</span></td><td>竖线 <code>|</code> 表示"或"。匹配三种触发场景。</td></tr>
  <tr><td><code>"type": "command"</code></td><td><span class="cmt">类型：命令</span></td><td>这条 hook 是一条 shell 命令。</td></tr>
  <tr><td><code>"command": "..."</code></td><td><span class="cmt">要执行的命令</span></td><td>调用 run-hook.cmd 来跑 session-start 脚本。</td></tr>
  <tr><td><code>"async": false</code></td><td><span class="cmt">同步（非异步）</span></td><td>必须等它跑完再开始会话，不能后台跑。</td></tr>
</table>

<h3>3.1 matcher 的三种触发场景</h3>
<p>matcher（匹配器）里的 <code>startup|clear|compact</code> 是关键，它定义了什么时候触发：</p>
<table>
  <tr><th>触发词</th><th><span class="en">中文</span></th><th>什么时候发生</th></tr>
  <tr><td><b>startup</b></td><td><span class="cmt">启动</span></td><td>你新开一个对话窗口</td></tr>
  <tr><td><b>clear</b></td><td><span class="cmt">清空</span></td><td>你点击"清空对话"按钮</td></tr>
  <tr><td><b>compact</b></td><td><span class="cmt">压缩</span></td><td>对话历史太长，AI 自动压缩上下文</td></tr>
</table>

<div class="callout info"><span class="icon">📌</span><div class="callout-body">为什么 compact 也要重新注入？因为压缩（compact）会把旧的系统提示词丢弃，重新生成。如果不在 compact 后再注入一次，AI 就会"忘记"自己有 superpowers。</div></div>

<h2>四、session-start 脚本到底干了什么</h2>
<p>这是这一节最核心的部分。我们看真实的 <code>hooks/session-start</code> 脚本（bash 写的），它做的事可以拆成 5 步：</p>

<h3>第 1 步：定位插件根目录</h3>
<pre><code>SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
PLUGIN_ROOT="$(cd "\${SCRIPT_DIR}/.." && pwd)"
</code></pre>
<p>脚本先算出自己所在的目录，再上一级得到 plugin 根目录。</p>

<h3>第 2 步：读取入口 skill 全文</h3>
<pre><code>using_superpowers_content=$(cat "\${PLUGIN_ROOT}/skills/using-superpowers/SKILL.md")
</code></pre>
<p>用 <code>cat</code> 把 <code>using-superpowers/SKILL.md</code> 整个文件读进变量。</p>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">注意只读 <code>using-superpowers</code> 这一个 skill。其他 13 个 skill 的全文并没有被注入。为什么？因为入口 skill 已经告诉 AI 怎么按需调用其他 skill 了，不需要全部塞进去。</div></div>

<h3>第 3 步：JSON 转义</h3>
<p>读进来的内容里有换行、双引号、反斜杠。如果直接拼到 JSON 里，JSON 会坏掉。所以要 escape（转义）：</p>
<pre><code>escape_for_json() 函数会做这些转义：
  反斜杠 \\   →  \\\\      <span class="cmt"># 一个变两个</span>
  双引号   "  →    "        <span class="cmt"># 前面加反斜杠</span>
  换行符      →    \\n       <span class="cmt"># 换行变成字面 \\n</span>
  回车符      →    \\r       <span class="cmt"># 回车变成字面 \\r</span>
  制表符      →    \\t       <span class="cmt"># 制表符变成字面 \\t</span>
</code></pre>

<h3>第 4 步：包进 EXTREMELY_IMPORTANT 标签</h3>
<pre><code>session_context="&lt;EXTREMELY_IMPORTANT&gt;
You have superpowers.

**Below is the full content of your 'superpowers:using-superpowers' skill ...**

\${using_superpowers_escaped}

&lt;/EXTREMELY_IMPORTANT&gt;"
</code></pre>

<p>这里有个非常聪明的设计：用 <code>&lt;EXTREMELY_IMPORTANT&gt;</code>（极度重要）标签把内容包起来。AI 看到这种全大写带"重要"字样的标签，会自然提高对里面内容的注意力权重。</p>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">这就是 superpowers 让 AI"听话"的关键技巧：把要强调的内容包进 <code>&lt;EXTREMELY_IMPORTANT&gt;</code> 标签。模棱两可的提示词，AI 可能忘；包了这种标签，AI 几乎不会忘。</div></div>

<h3>第 5 步：按平台输出不同 JSON</h3>
<p>最后一步最巧妙——脚本会根据当前是哪个客户端，输出不同格式的 JSON。为什么要这么做？因为不同客户端读 hook 输出的字段名不一样：</p>

<pre><code>if [ -n "\${CURSOR_PLUGIN_ROOT:-}" ]; then
  <span class="cmt"># Cursor 平台</span>
  printf '{ "additional_context": "%s" }' "$session_context"
elif [ -n "\${CLAUDE_PLUGIN_ROOT:-}" ] && [ -z "\${COPILOT_CLI:-}" ]; then
  <span class="cmt"># Claude Code 平台</span>
  printf '{ "hookSpecificOutput": {
    "hookEventName": "SessionStart",
    "additionalContext": "%s" } }' "$session_context"
else
  <span class="cmt"># Copilot CLI 或其他平台</span>
  printf '{ "additionalContext": "%s" }' "$session_context"
fi
</code></pre>

<table>
  <tr><th>平台</th><th>读的字段名</th><th><span class="en">中文</span></th></tr>
  <tr><td>Cursor</td><td><code>additional_context</code></td><td><span class="cmt">附加上下文（下划线命名）</span></td></tr>
  <tr><td>Claude Code</td><td><code>hookSpecificOutput.additionalContext</code></td><td><span class="cmt">嵌套结构</span></td></tr>
  <tr><td>Copilot CLI</td><td><code>additionalContext</code></td><td><span class="cmt">驼峰命名（SDK 标准）</span></td></tr>
</table>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">注意 Claude Code 会同时读 <code>additional_context</code> 和 <code>hookSpecificOutput</code>，<b>而且不去重</b>。如果两个都输出，内容会被注入两遍！所以脚本必须只输出当前平台消费的那一个字段。</div></div>

<h2>五、inject（注入）的全流程</h2>
<p>把上面 5 步串起来，inject（注入）过程是这样的：</p>
<ol>
  <li>用户启动 / 清空 / 压缩会话</li>
  <li>客户端触发 SessionStart hook</li>
  <li>hook 调用 <code>run-hook.cmd session-start</code></li>
  <li>脚本读 <code>using-superpowers/SKILL.md</code> 全文</li>
  <li>JSON 转义 + 包 <code>&lt;EXTREMELY_IMPORTANT&gt;</code> 标签</li>
  <li>按平台输出对应字段名的 JSON</li>
  <li>客户端把这段内容塞进 system prompt</li>
  <li>AI 在第一次回复前就"知道"自己有 superpowers</li>
</ol>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">一句话总结：SessionStart hook = 会话启动时自动跑的脚本，它把入口 skill 全文"硬塞"进 AI 的 system prompt，让 AI 一上来就知道自己有 superpowers。</div></div>

<h2>六、为什么其他 skill 不需要 hook？</h2>
<p>这是初学者最容易混淆的点。superpowers 有 14 个 skill，但只有 <code>using-superpowers</code> 这一个被 hook 注入。其他 13 个（比如 brainstorming、test-driven-development）都没有 hook。它们怎么被触发？</p>

<p>答案是：<b>靠 description 被 AI 按需调用</b>。</p>

<p>还记得模块二讲的吗？每个 skill 的 frontmatter 里有一行 <code>description</code>，写着"什么时候应该用我"。客户端把所有 skill 的 description 收集成一份目录，AI 看到用户的需求，自己去匹配目录里哪条 description 最合适，然后用 Skill 工具调用对应的 skill。这套机制叫"按需加载"（lazy loading）。</p>

<table>
  <tr><th>类型</th><th>加载方式</th><th>谁调用</th><th>用 hook 吗</th></tr>
  <tr><td>入口 skill（using-superpowers）</td><td>每次会话强制注入</td><td>客户端自动</td><td>是</td></tr>
  <tr><td>其他 13 个 skill</td><td>按需加载</td><td>AI 主动判断后调用</td><td>否</td></tr>
</table>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">设计哲学：入口 skill 用 hook 强制注入（保证 AI 一定知道体系存在），其他 skill 用 description 按需加载（节省 token，只在用得上时才读全文）。这是"必要 + 高效"的平衡。</div></div>

<h2>七、async（异步）字段为什么是 false？</h2>
<p>hook 配置里 <code>"async": false</code> 看起来是个小细节，其实很关键。async（异步）= false 意味着：客户端必须<b>等这个脚本跑完</b>，才能开始处理用户的第一条消息。</p>

<p>为什么必须这样？想象一下，如果 async = true（后台跑），用户问"帮我用 TDD 写个函数"，AI 这时还没收到 hook 注入的 superpowers 内容，就会按普通方式回答，完全不知道有 TDD skill 可以用。结果就是：用户体验崩了，"自动生效"成了空头支票。</p>

<div class="callout danger"><span class="icon">🚫</span><div class="callout-body">禁止把 SessionStart hook 设成 async: true。这会让"自动注入"变成"可能注入也可能没注入"，整个机制就废了。</div></div>

<h2>八、给初学者的启示</h2>
<p>看懂这一节，你已经掌握了 superpowers 设计的精髓。三个启示：</p>
<ul>
  <li><b>主动注入 > 被动等待</b>：与其祈祷 AI 发现你的 skill，不如用 hook 把它直接塞进 system prompt。</li>
  <li><b>强调用标签</b>：<code>&lt;EXTREMELY_IMPORTANT&gt;</code> 这种标签是真实有效的注意力引导手段。</li>
  <li><b>入口 + 按需的分层</b>：不要把所有 skill 都塞进 hook（token 爆炸），只塞入口 skill，其他靠 description。</li>
</ul>

<h2>九、要点总结</h2>
<div class="callout key"><span class="icon">💡</span><div class="callout-body">SessionStart hook 在 startup/clear/compact 三种时机触发，跑一段脚本，把入口 skill 全文转义后包进 &lt;EXTREMELY_IMPORTANT&gt; 标签，按平台输出 JSON，最终被注入 AI 的 system prompt。其他 skill 靠 description 按需加载。</div></div>

<h2>一、跨平台的痛点</h2>
<p>上一节我们说，SessionStart hook 会调用 <code>run-hook.cmd session-start</code>。但你有没有想过一个问题：Windows 和 macOS/Linux 用的根本不是同一种命令行！</p>

<table>

<p>如果 superpowers 想同时支持两个平台，最笨的办法是写两份脚本：<code>run-hook.cmd</code>（Windows 用）和 <code>run-hook.sh</code>（Unix 用）。但这样有个大问题：维护两份代码，改一个 bug 要改两个地方，迟早会不一致。</p>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">superpowers 的解法：只写一个文件 <code>run-hook.cmd</code>，让它<b>同时是合法的 batch 和合法的 bash</b>。这种"一份代码、两种解释器都能跑"的技巧叫 polyglot（多语言脚本）。</div></div>

<h2>二、什么是 polyglot（多语言脚本）</h2>
<p>polyglot 来自希腊语，原意是"会多种语言的人"（poly = 多，glot = 舌头/语言）。在编程里，它指一份代码能被多种语言的解释器同时接受。</p>

<p>经典的 polyglot 例子：一段代码既是合法 Python 又是合法 JavaScript。这种技巧通常靠"利用两种语言的注释语法差异"实现——A 语言把 B 语言的代码当注释跳过，反之亦然。</p>

<p>run-hook.cmd 就是 batch 和 bash 的 polyglot。它的核心技巧是用一个特殊的 bash 结构 <code>: &lt;&lt; 'CMDBLOCK'</code>，让 bash 把整段 batch 代码当成"长字符串"跳过。</p>

<h2>三、看真实代码（前半部分：batch）</h2>
<p>我们打开 superpowers 的 <code>hooks/run-hook.cmd</code>，第一行是这样的：</p>

<pre><code>: &lt;&lt; 'CMDBLOCK'
@echo off
REM Cross-platform polyglot wrapper for hook scripts.
REM On Windows: cmd.exe runs the batch portion, which finds and calls bash.
REM On Unix: the shell interprets this as a script (: is a no-op in bash).

if "%~1"=="" (
    echo run-hook.cmd: missing script name &gt;&amp;2
    exit /b 1
)

set "HOOK_DIR=%~dp0"

REM Try Git for Windows bash in standard locations
if exist "C:\\Program Files\\Git\\bin\\bash.exe" (
    "C:\\Program Files\\Git\\bin\\bash.exe" "%HOOK_DIR%%~1" %2 %3 %4 %5 %6 %7 %8 %9
    exit /b %ERRORLEVEL%
)
if exist "C:\\Program Files (x86)\\Git\\bin\\bash.exe" (
    "C:\\Program Files (x86)\\Git\\bin\\bash.exe" "%HOOK_DIR%%~1" %2 %3 %4 %5 %6 %7 %8 %9
    exit /b %ERRORLEVEL%
)

REM Try bash on PATH (e.g. user-installed Git Bash, MSYS2, Cygwin)
where bash &gt;nul 2&gt;nul
if %ERRORLEVEL% equ 0 (
    bash "%HOOK_DIR%%~1" %2 %3 %4 %5 %6 %7 %8 %9
    exit /b %ERRORLEVEL%
)

REM No bash found - exit silently rather than error
exit /b 0
CMDBLOCK
</code></pre>

<h3>3.1 在 Windows 上发生了什么</h3>
<p>当 Windows 的 cmd.exe 读到这个文件：</p>
<ol>
  <li>看到 <code>: &lt;&lt; 'CMDBLOCK'</code> —— cmd 把 <code>:</code> 当成一个"标签定义"（label），不会报错。</li>
  <li>然后执行下面的 <code>@echo off</code>、<code>if</code>、<code>set</code> 等批处理命令。</li>
  <li>关键是它会去找系统里的 <code>bash.exe</code>，先看 <code>C:\\Program Files\\Git\\bin\\bash.exe</code>，再看 PATH 里有没有 bash。</li>
  <li>找到后，调用 bash 去执行真正的 hook 脚本（比如 <code>session-start</code>）。</li>
</ol>

<div class="callout info"><span class="icon">📌</span><div class="callout-body">补充：为什么默认找 Git Bash？因为大多数 Windows 开发者都装了 Git for Windows，它自带 bash。这是"借用最普及的 bash 来源"，避免要求用户额外装东西。</div></div>

<h2>四、看真实代码（后半部分：bash）</h2>
<p>同一个文件的最后几行：</p>

<pre><code># Unix: run the named script directly
SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
SCRIPT_NAME="$1"
shift
exec bash "\${SCRIPT_DIR}/\${SCRIPT_NAME}" "$@"
</code></pre>

<h3>4.1 在 Unix 上发生了什么</h3>
<p>当 macOS/Linux 的 bash 读到这个文件：</p>
<ol>
  <li>看到第一行 <code>: &lt;&lt; 'CMDBLOCK'</code> —— 在 bash 里，<code>:</code> 是个"什么都不做"的内置命令（no-op），<code>&lt;&lt; 'CMDBLOCK'</code> 是 here-document（Here 文档）语法，意思是"读入后面所有内容直到遇到 CMDBLOCK 这个标记，并塞给前面的命令"。</li>
  <li>因为 <code>:</code> 命令忽略输入，所以整个 batch 部分（包括 <code>@echo off</code>、<code>if exist</code> 那一大段）被 bash 当成 here-doc 的内容<b>直接丢弃</b>。</li>
  <li>跳过 <code>CMDBLOCK</code> 标记后，bash 开始执行最后的 4 行真正的 bash 代码。</li>
  <li>用 <code>exec bash ...</code> 直接调用真正的 hook 脚本。</li>
</ol>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">核心魔法：<code>: &lt;&lt; 'CMDBLOCK' ... CMDBLOCK</code> 这对标记，让 bash 把整段 Windows 专用代码当成"被丢弃的字符串"，完美跳过。而 cmd.exe 不认识 here-doc，但它把 <code>:</code> 当无害的标签，照样往下执行 batch 部分。两边各取所需。</div></div>

<h2>五、exec 命令是什么意思</h2>
<p>Unix 部分最后用了 <code>exec bash "\${SCRIPT_DIR}/\${SCRIPT_NAME}" "$@"</code>。exec（执行并替换）是个特别的命令：</p>

<table>
  <tr><th>普通调用</th><th>exec 调用</th></tr>
  <tr><td>bash 启动一个<b>子进程</b>跑目标脚本，自己等着</td><td>bash 把自己<b>直接替换</b>成目标脚本，不留子进程</td></tr>
</table>

<p>为什么要用 exec？因为如果不用，当前 bash 进程会一直等着子进程结束，多占一个进程。用 exec 后，进程数少一个，信号（比如 Ctrl+C）也能正确传到真正的 hook 脚本上。</p>

<div class="callout tip"><span class="icon">✅</span><div class="callout-body">一句话总结：写"调用别的脚本并立刻退出"的 wrapper 时，用 exec 比直接调用更优雅。</div></div>

<h2>六、扩展名为什么是 .cmd 而不是 .sh</h2>
<p>这里有个非常细心的设计：真正的 hook 脚本（<code>session-start</code>）<b>没有扩展名</b>。代码注释里特意解释了原因：</p>

<blockquote>"Hook scripts use extensionless filenames (e.g. 'session-start' not 'session-start.sh') so Claude Code's Windows auto-detection -- which prepends 'bash' to any command containing .sh -- doesn't interfere."</blockquote>
<p><span class="cmt">翻译：hook 脚本故意不用扩展名（比如写成 session-start 而不是 session-start.sh），这样 Claude Code 在 Windows 上的自动检测——它会给任何含 .sh 的命令前面加 bash——就不会乱插手。</span></p>

<p>为什么要避开自动加 bash？因为 wrapper 脚本 run-hook.cmd 自己已经处理好了 bash 的查找逻辑，客户端再插一脚反而会出问题。这是"为了避免聪明反被聪明误"的工程妥协。</p>

<h2>七、设计哲学：为什么这么折腾？</h2>
<p>看到这里你可能会问：值得吗？为了一个 wrapper 搞这么复杂。答案是值得的，理由有三：</p>

<ul>
  <li><b>单一代码源（single source of truth（单一信息源））</b>：只维护一份 run-hook.cmd，改 bug 只改一个地方，永远不会出现 Windows 版和 Unix 版不一致。</li>
  <li><b>利用 Git Bash 普及度</b>：Windows 开发者几乎都装了 Git for Windows，它自带 bash。借用这个事实，superpowers 不需要要求用户额外装 WSL 或 Cygwin。</li>
  <li><b>优雅降级（graceful degradation（优雅降级））</b>：注释里写得很清楚——"No bash found - exit silently rather than error"。如果系统真没 bash，脚本不报错，只是 SessionStart 注入功能悄悄失效，plugin 的其他功能（skill 加载）照样能用。</li>
</ul>

<div class="callout warn"><span class="icon">⚠️</span><div class="callout-body">注意"优雅降级"这个设计：注释明确说"插件仍然能工作，只是没有 SessionStart 上下文注入"。这是非常成熟的工程思维——核心功能挂了不影响其他功能，而不是一损俱损。</div></div>

<h2>八、Cursor 平台的变体 hooks-cursor.json</h2>
<p>顺便看一下 <code>hooks/hooks-cursor.json</code>。Cursor 客户端的 hook 格式跟 Claude Code 不太一样，所以 superpowers 准备了一个变体：</p>

      }
    ]
  }
}
</code></pre>

<p>对比 Claude Code 的 hooks.json，区别有：</p>
<ul>
  <li>事件名：<code>sessionStart</code>（驼峰）vs Claude Code 的 <code>SessionStart</code>（帕斯卡）</li>
  <li>不需要 <code>matcher</code> 字段</li>
  <li>命令用相对路径 <code>./hooks/...</code></li>
</ul>

<p>但两边调用的都是同一个 <code>run-hook.cmd</code>。也就是说，平台差异在配置文件层面解决，核心脚本（polyglot + session-start）保持一致。</p>

<h2>五、验收标准（verify，怎么算合格）</h2>

<p>把 plugin 放到 <code>~/.zcode/plugins/</code>，重启客户端。在 plugin 列表里能看到你的 plugin 名字，点进去能看到所有 skill。这一条验证的是模块六学得对不对。</p>

<h3>验收 2：skill 的 description 能正确触发</h3>
<p>用一个<b>自然的、不带提示词</b>的提问测试。比如对"中文写作助手"，你问："这段话读起来怪怪的，帮我看看——'这个事情我觉得是必须要做的'。"如果 AI 自动调用了 punctuation-rules 或 word-choice，说明 description 写对了。这一条验证的是模块五学得对不对。</p>

<h3>验收 3：至少一个压力场景下 AI 遵守规则</h3>
<p>压力场景（stress test（压力测试））= 故意用模糊、跨领域、有歧义的提问，看 AI 还能不能守住 skill 里写的规则。比如：你问"这段中文有没有翻译腔"，但实际给的文本是一段 Python 代码注释。优秀的 skill 应该能识别这是"代码注释里的中文"，仍然调用 word-choice skill 检查翻译腔，而不是傻乎乎地说"这不是中文"。这一条验证的是模块三、四、五综合学得对不对。</p>

<p>给你一个推荐的工作节奏（你自己可以调）：</p>
<ol>
  <li><b>选主题</b>（10 分钟）：从三个建议里挑一个，或者想一个自己的。</li>
  <li><b>列 skill 清单</b>（10 分钟）：入口 skill 叫什么、其他 skill 叫什么、它们各自负责什么规则。</li>
  <li><b>写入口 skill 的 SKILL.md</b>（15 分钟）：参考 using-superpowers 的写法，告诉 AI "你是 X 助手，下面是你可以调用的 skill"。</li>
  <li><b>写其他 skill 的 SKILL.md</b>（每个 15 分钟）：每个 skill 用模块三的武器表达规则。</li>
  <li><b>挑一个 skill 走 TDD</b>（20 分钟）：先写"如果用户这样问，AI 应该这样回答"的测试，看它失败，改 skill 让它通过。</li>
  <li><b>打包成 plugin</b>（10 分钟）：建 plugin.json，整理目录。</li>
  <li><b>跑三条验收</b>（15 分钟）：加载、触发、压力测试。</li>
  <li><b>（可选）加 SessionStart hook</b>（15 分钟）：让入口 skill 自动注入。</li>
</ol>

<p>总计大约 2 小时。第一次做可能更慢，没关系，关键是走完整流程。</p>

<h2>七、学完整个课程后，下一步去哪？</h2>
<p>毕业不是结束，是开始。下面是三条进阶路径：</p>

<h3>路径 1：读 superpowers 源码</h3>
<p>把 superpowers 的 14 个 SKILL.md 全读一遍。你已经具备看懂它们的全部知识。重点看：using-superpowers 怎么写入口、brainstorming 怎么用渐进披露、test-driven-development 怎么用检查清单。读真实高手写的 skill，是提升自己最快的办法。</p>

<h3>路径 2：贡献 PR（Pull Request）</h3>
<p>superpowers 是开源项目（在 GitHub 上）。如果你发现某个 skill 的 description 在中文场景下触发不好，可以提 PR 改进它。contribute（贡献）开源项目是检验你掌握程度的最佳方式——你的改动要被维护者认可，才算真的懂了。</p>

<h3>路径 3：做你自己的 skill 系列</h3>
<p>围绕你的工作或兴趣，做一个专属 plugin 系列。比如你是前端工程师，可以做"React 性能优化助手"、"TypeScript 类型推导助手"、"CSS 布局急救助手"。每解决一个反复出现的问题，就把它沉淀成一个 skill。日积月累，你会有一套只属于你的、能极大提升效率的工具箱。</p>

<h2>八、课程总结：你学到的到底是什么？</h2>
<p>回头看这七模块二十多节课，你学到的表面是"怎么写 skill"，但本质是一套<b>方法论（methodology）</b>。这套方法论可以一句话概括：</p>

<blockquote>用结构化的文档，驱动 AI 的行为。</blockquote>

<p>展开来说，你掌握了五件事：</p>
<ul>
  <li><b>思维</b>：把"反复出现的问题"识别出来，沉淀成可复用的 skill。</li>
  <li><b>结构</b>：用 frontmatter + 正文 + 6 种武器，把模糊的"经验"变成清晰的"规则"。</li>
  <li><b>验证</b>：用 TDD 思路写 skill——先定义"AI 应该怎么做"，再让 skill 真的做到。</li>
  <li><b>穿透</b>：description 写作、压力测试、避免冲突，确保 AI 真的"听得见"你的规则。</li>
  <li><b>打包</b>：用 plugin + hook 把 skill 变成可分发、可自动加载的完整产品。</li>
</ul>

<div class="callout key"><span class="icon">💡</span><div class="callout-body">这五件事组合起来，就是"用文档驱动 AI 行为"的完整闭环。这套方法论不只适用于写 zcode 的 skill，它适用于任何需要"让 LLM 稳定按规则办事"的场景——无论是写 system prompt（系统提示词）、写 agent 指令、还是设计 AI 工作流。</div></div>

<p>未来不管 AI 模型怎么升级、客户端怎么变，这套"结构化表达规则 + 测试验证 + 持续精修"的方法论都不会过时。因为它的核心不是某个具体工具，而是<b>如何把人类的隐性经验，变成 AI 能稳定执行的显性指令</b>。这才是这门课真正想教给你的东西。</p>

const STORAGE_KEY = "superpowers-course-state-v1";
let state = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  // 初始化默认状态
  const s = { completed: {}, homework: {}, currentLesson: "1.1", theme: "light" };

}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

/* ============ 工具函数 ============ */
function getAllLessons() {
  return COURSE.modules.flatMap(m => m.lessons);
}
function getLesson(id) {
  return LESSONS[id];
}
function findModuleByLesson(id) {
  for (const m of COURSE.modules) {
    if (m.lessons.find(l => l.id === id)) return m;
  }
  return null;
}
function getPrevNext(id) {
  const all = getAllLessons();
  const idx = all.findIndex(l => l.id === id);
  return {
    prev: idx > 0 ? all[idx - 1] : null,
    next: idx < all.length - 1 ? all[idx + 1] : null,
    idx, all
  };
}

/* ============ 渲染：侧边栏 ============ */
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  COURSE.modules.forEach(m => {
    const completedCount = m.lessons.filter(l => state.completed[l.id]).length;
    const totalCount = m.lessons.length;
    html += `
    <div class="sidebar-section" id="section-${m.id}">
      <div class="sidebar-module" onclick="toggleModule('${m.id}')">
        <span class="dot">${m.color}</span>
        <div class="module-label">
          <span class="module-title">${m.title}</span>
          <span class="module-meta">${m.meta} · ${completedCount}/${totalCount}</span>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="sidebar-lessons">`;
    m.lessons.forEach(l => {
      const has = !!getLesson(l.id);
      const isActive = state.currentLesson === l.id;
      const isDone = state.completed[l.id];
      const cls = ['sidebar-lesson'];
      if (isActive) cls.push('active');
      if (isDone) cls.push('completed');
      html += `
        <div class="${cls.join(' ')}" ${has ? `onclick="goLesson('${l.id}')"` : ''} style="${has ? '' : 'opacity:0.4;cursor:not-allowed'}">
          <span class="status"></span>
          <span class="num">${l.id}</span>
          <span>${l.title}${has ? '' : ' <em style="font-size:11px;color:var(--text-muted)">（待更新）</em>'}</span>
        </div>`;
    });
    html += `</div></div>`;
  });
  sb.innerHTML = html;

  // 默认展开当前课所在模块
  const curMod = findModuleByLesson(state.currentLesson);
  if (curMod) {
    document.querySelectorAll('.sidebar-section').forEach(s => s.classList.add('collapsed'));
    document.getElementById(`section-${curMod.id}`).classList.remove('collapsed');
  }
}

function toggleModule(id) {
  document.getElementById(`section-${id}`).classList.toggle('collapsed');
}

      <div class="lesson-header">
        <div class="lesson-breadcrumb">${moduleInfo.color} ${moduleInfo.title} <span class="sep">/</span> 第 ${id} 课</div>
        <h1 class="lesson-title">${meta.title}</h1>
        <div class="lesson-meta">
          <span class="meta-tag difficulty">难度 ${meta.difficulty}</span>
          <span class="meta-tag duration">⏱ ${meta.duration}</span>
        </div>
      </div>
      <div class="callout warn"><span class="icon">🚧</span><div class="callout-body">
        <p><strong>这一课还在路上</strong></p>
        <p>我们正在按顺序撰写课程内容。已发布的课时都能正常学习，这一课很快会更新。</p>
        <p style="margin-top:10px">当前进度：${getCompletedCount()}/${getAllLessons().length} 课已完成</p>
      </div></div>
      ${renderNav(id)}
    `;
    updateProgress();
    return;
  }

  const isDone = state.completed[id];
  const hwSaved = state.homework[id] || {};

  content.innerHTML = `
    <div class="lesson-header">
      <div class="lesson-breadcrumb">${moduleInfo.color} ${moduleInfo.title} <span class="sep">/</span> 第 ${id} 课</div>
      <h1 class="lesson-title">${lesson.title}</h1>
      <div class="lesson-meta">
        <span class="meta-tag difficulty">难度 ${lesson.difficulty}</span>
        <span class="meta-tag duration">⏱ ${lesson.duration}</span>
      </div>
      <div class="lesson-goal">🎯 <strong>本课目标：</strong>${lesson.goal}</div>
    </div>

    <div class="lesson-body">${lesson.body}</div>

    ${lesson.homework ? renderHomework(id, lesson.homework, hwSaved) : ''}

    <button class="mark-complete ${isDone ? 'done' : ''}" onclick="toggleComplete('${id}')">
      ${isDone ? '✅ 本课已完成' : '○ 标记本课为已完成'}
    </button>

    ${renderNav(id)}
  `;

  // 滚动到顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // 关闭移动端侧栏
  document.querySelector('.sidebar').classList.remove('open');
  updateProgress();
}

function renderNav(id) {
  const { prev, next } = getPrevNext(id);
  return `
    <div class="lesson-nav">
      <button class="nav-btn prev" ${prev && getLesson(prev.id) ? `onclick="goLesson('${prev.id}')"` : 'disabled'}>
        <span>←</span>
        <span>
          <span class="nav-label">上一课</span>
          <span class="nav-title">${prev ? prev.id + ' ' + prev.title : '已经是第一课'}</span>
        </span>
      </button>
      <button class="nav-btn next" ${next && getLesson(next.id) ? `onclick="goLesson('${next.id}')"` : 'disabled'}>
        <span>
          <span class="nav-label">下一课</span>
          <span class="nav-title">${next ? next.id + ' ' + next.title : '已经是最后一课'}</span>
        </span>
        <span>→</span>
      </button>
    </div>
  `;
}

/* ============ 导航与交互 ============ */
function goLesson(id) {
  if (!getLesson(id)) return;
  state.currentLesson = id;
  saveState();
  renderSidebar();
  renderLesson(id);
}

function toggleComplete(id) {
  if (state.completed[id]) {
    delete state.completed[id];
    showToast('已取消标记');
  } else {
    state.completed[id] = true;
    showToast('🎉 完成标记！继续加油');
  }
  saveState();
  renderSidebar();
  renderLesson(id);
}

/* ============ 作业渲染：支持选择题和手写题两种 ============ */
function renderHomework(id, hw, saved) {
  // 选择题
  if (hw.type === 'choice') {
    const selected = (saved && Array.isArray(saved.selected)) ? saved.selected : [];
    const revealed = !!(saved && saved.revealed);
    return `
    <div class="homework">
      <div class="homework-header">📝 ${hw.title} ${hw.multi ? '<span class="hw-type">多选</span>' : '<span class="hw-type">单选</span>'}</div>
      <div class="homework-body">
        <div class="homework-prompt">${hw.prompt}</div>
        <div class="choice-list" id="choiceList">
          ${hw.options.map(opt => {
            const isSelected = selected.includes(opt.key);
            return `
            <label class="choice-option ${isSelected ? 'selected' : ''} ${revealed ? (opt.correct ? 'correct' : (isSelected ? 'wrong' : 'dim')) : ''}" data-key="${opt.key}">
              <input type="${hw.multi ? 'checkbox' : 'radio'}" name="choice-${id}" value="${opt.key}" ${isSelected ? 'checked' : ''} onchange="toggleChoice('${id}', '${opt.key}', ${hw.multi})">
              <span class="choice-marker">${hw.multi ? '☐' : '○'}</span>
              <span class="choice-marker-check">✓</span>
              <span class="choice-label">${opt.label}</span>
              <span class="choice-result">${opt.correct ? '✅ 适合' : '❌ 不适合'}</span>
            </label>`;
          }).join('')}
        </div>
        <div class="homework-actions">
          <button class="btn btn-primary" onclick="revealChoices('${id}')" ${revealed ? 'disabled' : ''}>
            ${revealed ? '✓ 已查看解释' : '📖 查看解释'}
          </button>
          ${selected.length > 0 && !revealed ? `<button class="btn btn-secondary" onclick="clearChoices('${id}')">清除选择</button>` : ''}
        </div>
        <div class="choice-explanations ${revealed ? 'show' : ''}" id="choiceExplanations">
          ${revealed ? `
            <div class="choice-result-summary">
              ${(() => {
                const correctKeys = hw.options.filter(o => o.correct).map(o => o.key);
                const userRight = selected.filter(k => correctKeys.includes(k)).length;
                const userWrong = selected.filter(k => !correctKeys.includes(k)).length;
                const missed = correctKeys.filter(k => !selected.includes(k)).length;
                const perfect = userWrong === 0 && missed === 0 && userRight === correctKeys.length;
                return `
                  <div class="result-score ${perfect ? 'perfect' : (userRight > 0 ? 'partial' : 'wrong')}">
                    ${perfect ? '🎉 全对！' : `${userRight} 对 / ${userWrong} 错选 / ${missed} 漏选`}
                  </div>
                  <div class="result-correct-answer">正确答案：<strong>${correctKeys.join('、')}</strong></div>
                  <div class="result-your-answer">你的选择：${selected.length ? '<strong>' + selected.join('、') + '</strong>' : '（未选择）'}</div>
                `;
              })()}
            </div>
            <div class="choice-explanation-list">
              ${hw.options.map(opt => {
                const userPicked = selected.includes(opt.key);
                const state = opt.correct ? 'is-correct' : (userPicked ? 'is-wrong-pick' : 'is-correct-skip');
                return `
                <div class="choice-explanation ${state}">
                  <div class="ce-header">
                    <span class="ce-badge ${opt.correct ? 'good' : 'bad'}">${opt.correct ? '✅' : '❌'} ${opt.key}</span>
                    ${userPicked ? '<span class="ce-you">你选了</span>' : ''}
                  </div>
                  <div class="ce-label">${opt.label}</div>
                  <div class="ce-explain">${opt.explanation}</div>
                </div>`;
              }).join('')}
            </div>
            ${hw.summary ? `<div class="choice-summary">💡 ${hw.summary}</div>` : ''}
          ` : ''}
        </div>
      </div>
    </div>`;
  }
  // 兼容：手写题（旧格式）
  return `
    <div class="homework">
      <div class="homework-header">📝 ${hw.title}</div>
      <div class="homework-body">
        <div class="homework-prompt">${hw.prompt}</div>
        <textarea class="homework-textarea" id="hwTextarea" placeholder="在这里写下你的答案，会自动保存到本地...">${typeof saved === 'string' ? saved : ''}</textarea>
        <div class="homework-actions">
          <button class="btn btn-primary" onclick="saveTextHomework('${id}')">💾 保存答案</button>
          <span class="homework-saved" id="hwSaved">已保存 ✓</span>
        </div>
      </div>
    </div>`;
}

function toggleChoice(lessonId, key, isMulti) {
  const hw = LESSONS[lessonId].homework;
  let saved = state.homework[lessonId] || { selected: [], revealed: false };
  if (typeof saved === 'string') saved = { selected: [], revealed: false };
  if (!Array.isArray(saved.selected)) saved.selected = [];
  // 一旦查看过解释，不再允许改答案
  if (saved.revealed) return;

  if (isMulti) {
    if (saved.selected.includes(key)) {
      saved.selected = saved.selected.filter(k => k !== key);
    } else {
      saved.selected.push(key);
    }
  } else {
    saved.selected = [key];
  }
  state.homework[lessonId] = saved;
  saveState();
  // 只刷新作业区，避免整页重渲染滚动跳变
  rerenderHomeworkOnly(lessonId);
}

function clearChoices(lessonId) {
  let saved = state.homework[lessonId] || {};
  if (typeof saved === 'string') saved = {};
  saved.selected = [];
  saved.revealed = false;
  state.homework[lessonId] = saved;
  saveState();
  rerenderHomeworkOnly(lessonId);
}

function revealChoices(lessonId) {
  let saved = state.homework[lessonId] || { selected: [], revealed: false };
  if (typeof saved === 'string') saved = { selected: [], revealed: false };
  if (!Array.isArray(saved.selected)) saved.selected = [];
  saved.revealed = true;
  state.homework[lessonId] = saved;
  saveState();
  rerenderHomeworkOnly(lessonId);
  // 平滑滚动到解释区
  setTimeout(() => {
    const exp = document.getElementById('choiceExplanations');
    if (exp) exp.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 80);
}

function saveTextHomework(id) {
  const text = document.getElementById('hwTextarea').value;
  state.homework[id] = text;
  saveState();
  const saved = document.getElementById('hwSaved');
  saved.classList.add('show');
  setTimeout(() => saved.classList.remove('show'), 2000);
}

// 只重渲染作业区，保持页面其他部分和滚动位置不变
function rerenderHomeworkOnly(lessonId) {
  const hw = LESSONS[lessonId].homework;
  const saved = state.homework[lessonId] || {};
  // 找到当前 homework 容器（它在 contentInner 里）
  const oldHw = document.querySelector('.content-inner .homework');
  if (!oldHw) return;
  const wrap = document.createElement('div');
  wrap.innerHTML = renderHomework(lessonId, hw, saved);
  const newHw = wrap.firstElementChild;
  oldHw.replaceWith(newHw);
}

function getCompletedCount() {
  return Object.keys(state.completed).filter(k => state.completed[k] && getLesson(k)).length;
}
function getPublishedCount() {
  return getAllLessons().filter(l => getLesson(l.id)).length;
}

function updateProgress() {
  const done = getCompletedCount();
  const total = getPublishedCount();
  const pct = total === 0 ? 0 : (done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
}

/* ============ 主题切换 ============ */
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  saveState();
  applyTheme();
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  const isDark = state.theme === 'dark';
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isDark ? '亮色' : '暗色';
}

/* ============ 搜索 ============ */
let searchIndex = null;
function buildSearchIndex() {
  searchIndex = [];
  for (const id in LESSONS) {
    const l = LESSONS[id];
    const body = l.body.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    searchIndex.push({ id, title: l.title, content: body });
  }
}
function openSearch() {
  document.getElementById('searchOverlay').classList.add('show');
  const box = document.getElementById('searchBox');
  box.value = '';
  setTimeout(() => box.focus(), 50);
  doSearch();
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('show');
}
function doSearch() {
  if (!searchIndex) buildSearchIndex();
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const results = document.getElementById('searchResults');
  if (!q) {
    results.innerHTML = '<div class="search-empty">输入关键词开始搜索课程内容</div>';
    return;
  }
  const matches = searchIndex.filter(item =>
    item.title.toLowerCase().includes(q) || item.content.toLowerCase().includes(q)
  ).slice(0, 20);

  if (matches.length === 0) {
    results.innerHTML = '<div class="search-empty">没有找到匹配的内容</div>';
    return;
  }
  results.innerHTML = matches.map(m => {
    const idx = m.content.toLowerCase().indexOf(q);
    let snippet = '';
    if (idx >= 0) {
      const start = Math.max(0, idx - 30);
      const end = Math.min(m.content.length, idx + 80);
      snippet = (start > 0 ? '...' : '') + m.content.slice(start, end) + (end < m.content.length ? '...' : '');
      const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      snippet = snippet.replace(re, m => `<mark>${m}</mark>`);
    }
    return `<div class="search-result" onclick="goLesson('${m.id}');closeSearch()">
      <div class="search-result-title">第 ${m.id} 课 · ${m.title}</div>
      ${snippet ? `<div class="search-result-snippet">${snippet}</div>` : ''}
    </div>`;
  }).join('');
}

/* ============ Toast ============ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* ============ 初始化 ============ */
applyTheme();
buildSearchIndex();
renderSidebar();
renderLesson(state.currentLesson || '1.1');

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeSearch();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
});
// 搜索框点击也能打开（解除 readonly）
document.getElementById('searchInput').addEventListener('mousedown', (e) => {
  e.preventDefault();
  openSearch();
  setTimeout(() => document.getElementById('searchBox').focus(), 50);
});
</script>
</body>
</html>
